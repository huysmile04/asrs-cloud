<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warehouse Map - Automated Storage System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            color: #333;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* === HEADER === */
        header {
            background: #e5e5e5;
            padding: 15px 40px;
            border-bottom: 2px solid #ccc;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 1100px;
            border-radius: 16px 16px 0 0;
        }

        .logo img {
            height: 40px;
            margin-right: 10px;
        }

        .user-info {
            font-weight: bold;
        }

        .btn-header {
            color: white;
            border: none;
            padding: 8px 20px;
            font-size: 14px;
            border-radius: 4px;
            cursor: pointer;
        }

        .back-btn {
            background: #556270;
            margin-right: 10px;
        }

        .logout-btn {
            background: #c9302c;
        }

        .back-btn:hover {
            background: #3f464e;
        }

        .logout-btn:hover {
            background: #ac2925;
        }

        /* === DASHBOARD === */
        .dashboard-container {
            width: 100%;
            max-width: 1100px;
            background: #fff;
            border-radius: 0 0 16px 16px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            background: #1a252f;
            color: white;
            padding: 15px 30px;
            font-weight: bold;
            font-size: 14px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .status-item span {
            font-weight: normal;
            margin-left: 8px;
            padding: 4px 10px;
            border-radius: 20px;
        }

        .main-content {
            display: flex;
            padding: 30px;
            gap: 40px;
        }

        /* === CONTROL PANEL === */
        .control-panel {
            flex: 1;
            background: #fdfdfd;
            border: 1px solid #eee;
            border-radius: 12px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .control-panel h3 {
            color: #00529c;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }

        .instruction {
            font-size: 13px;
            color: #666;
            background: #eef2f5;
            padding: 12px 15px;
            border-radius: 8px;
            border-left: 4px solid #3498db;
            line-height: 1.6;
        }

        .input-group label {
            font-weight: bold;
            font-size: 14px;
            display: block;
            margin-bottom: 5px;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            outline: none;
            font-size: 14px;
        }

        .btn {
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            color: white;
            transition: 0.2s;
            text-align: center;
            font-size: 14px;
        }

        .btn:hover:not(:disabled) {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .btn:disabled {
            background-color: #ddd !important;
            color: #999 !important;
            cursor: not-allowed;
            transform: none !important;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
        }

        .action-buttons .btn {
            flex: 1;
            padding: 14px;
            font-size: 15px;
        }

        .bg-green {
            background-color: #2ecc71;
        }

        .bg-red {
            background-color: #e74c3c;
        }

        .bg-blue {
            background-color: #00529c;
        }

        .bg-orange {
            background-color: #f39c12;
        }

        .swal-cancel-btn {
            background: #c0392b;
            color: white;
            border: none;
            padding: 11px 0;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            width: 100%;
            margin-top: 4px;
            transition: background 0.2s;
        }

        .swal-cancel-btn:hover {
            background: #a93226;
        }

        /* === STATUS BOX === */
        .sys-status-box {
            border: 2px solid #ccc;
            border-radius: 10px;
            padding: 16px 12px;
            text-align: center;
            transition: border-color 0.4s, background 0.4s;
            background: #f8f9fa;
        }

        .sys-status-box.idle {
            border-color: #2ecc71;
            background: #f0fff5;
        }

        .sys-status-box.busy {
            border-color: #f39c12;
            background: #fffbf0;
        }

        .sys-status-box.error {
            border-color: #e74c3c;
            background: #fff5f5;
        }

        .sys-status-icon {
            font-size: 30px;
            margin-bottom: 6px;
        }

        .sys-status-text {
            font-weight: 800;
            font-size: 14px;
            color: #222;
            margin-bottom: 3px;
        }

        .sys-status-sub {
            font-size: 12px;
            color: #888;
            min-height: 16px;
        }

        /* === GRID === */
        .grid-panel {
            flex: 2;
        }

        .grid-panel.busy .slot-card {
            pointer-events: none;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .slot-card {
            background: #fff;
            border: 2px solid #eee;
            border-radius: 12px;
            padding: 20px 15px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .slot-card:hover:not(.active) {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.1);
        }

        .slot-card.available {
            border-top: 5px solid #2ecc71;
            background-color: #f9fffb;
        }

        .slot-card.occupied {
            border-top: 5px solid #e74c3c;
            background-color: #fffaf9;
        }

        .slot-card.selected {
            border: 3px solid #00529c !important;
            background-color: #eef5ff;
            box-shadow: 0 0 0 4px rgba(0, 82, 156, 0.12);
        }

        .slot-card.active {
            border: 3px solid #f39c12 !important;
            border-top: 5px solid #f39c12 !important;
            background-color: #fffdf0 !important;
            animation: pulse-slot 1.2s ease-in-out infinite;
        }

        @keyframes pulse-slot {

            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(243, 156, 18, 0.5);
            }

            50% {
                box-shadow: 0 0 0 10px rgba(243, 156, 18, 0);
            }
        }

        .slot-number {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }

        .available .status-text {
            color: #2ecc71;
            font-weight: bold;
            font-size: 13px;
        }

        .occupied .status-text {
            color: #e74c3c;
            font-size: 12px;
            font-family: monospace;
        }

        .active .status-text {
            color: #f39c12;
            font-weight: bold;
            font-size: 12px;
        }

        /* === RESPONSIVE === */
        @media (max-width: 850px) {
            .main-content {
                flex-direction: column;
                gap: 20px;
            }

            .status-bar {
                justify-content: center;
                font-size: 13px;
            }

            .grid-panel {
                width: 100%;
            }
        }

        @media (max-width: 600px) {
            body {
                padding: 10px;
            }

            header {
                padding: 10px 14px;
                border-radius: 12px 12px 0 0;
            }

            .logo img {
                height: 32px;
            }

            .btn-header {
                padding: 7px 12px;
                font-size: 12px;
            }

            .main-content {
                padding: 16px;
                gap: 16px;
            }

            .control-panel {
                padding: 18px;
            }

            .slot-card {
                padding: 14px 8px;
            }

            .slot-number {
                font-size: 15px;
            }
        }

        @media (max-width: 420px) {
            .grid-container {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }

            .status-bar {
                padding: 10px 14px;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="logo"><a href="index.html"><img src="logo.png" alt="HCMUTE Logo"></a></div>
        <div class="user-info">Hello, <span id="userName">Operator</span></div>
        <div>
            <button class="btn-header back-btn" onclick="location.href='dashboard.html'">← Back</button>
            <button class="btn-header logout-btn" onclick="doLogout()">Logout</button>
        </div>
    </header>

    <div class="dashboard-container">
        <div class="status-bar">
            <div class="status-item">PLC S7-1200: <span id="plcBadge" class="bg-red">DISCONNECTED</span></div>
            <div class="status-item">STATUS: <span id="statusBadge" class="bg-green">IDLE</span></div>
            <div class="status-item">TARGET SLOT: <span id="targetSlotBadge" style="background:#555;">N/A</span></div>
            <div class="status-item">Last Update: <span id="lastUpdate" style="background:#555;">--:--:--</span></div>
        </div>

        <div class="main-content">

            <!-- CONTROL PANEL -->
            <div class="control-panel">
                <h3>🤖 Automatic Control</h3>

                <!-- HỘP TRẠNG THÁI HỆ THỐNG -->
                <div class="sys-status-box" id="sysStatusBox">
                    <div class="sys-status-icon" id="sysStatusIcon">🔌</div>
                    <div class="sys-status-text" id="sysStatusText">PLC Disconnected</div>
                    <div class="sys-status-sub" id="sysStatusSub"></div>
                </div>

                <div class="input-group">
                    <label>Product information (optional):</label>
                    <input type="text" id="uidInput" placeholder="Enter product info or leave blank...">
                </div>

                <div class="action-buttons">
                    <button class="btn bg-blue" id="importBtn" onclick="processAction('IMPORT')" disabled>📥
                        IMPORT</button>
                    <button class="btn bg-red" id="exportBtn" onclick="processAction('EXPORT')" disabled>📤
                        EXPORT</button>
                </div>
            </div>

            <!-- WAREHOUSE GRID -->
            <div class="grid-panel" id="gridPanel">
                <div class="grid-container" id="gridContainer"></div>
            </div>

        </div>
    </div>

    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/mqtt@5.3.4/dist/mqtt.min.js" crossorigin="anonymous"></script>
    <script>
        authGuard();

        // ── STATE ──────────────────────────────────────────────────────────────
        let isPlcConnected = true;
        let isSystemBusy = false;
        let activeSlot = null;
        let selectedSlotId = null;
        let currentAction = null;
        let mqttClient = null;
        let timeInterval = null;
        // Trạng thái luồng IMPORT/EXPORT
        let _dialogPhase = null; // null | 'waiting_rfid' | 'moving' | 'done'
        let _cancelRequested = false;
        let isMaintenanceMode = false;

        const defaultData = Object.fromEntries(
            Array.from({ length: 9 }, (_, i) => [i + 1, { uid: null, status: 'available' }])
        );
        let slotData = JSON.parse(localStorage.getItem('warehouseDataV2')) || defaultData;

        // ── GRID ───────────────────────────────────────────────────────────────
        function initGrid() {
            const container = document.getElementById('gridContainer');
            container.innerHTML = '';
            if (!slotData || !slotData[1]) {
                slotData = JSON.parse(JSON.stringify(defaultData));
                localStorage.setItem('warehouseDataV2', JSON.stringify(slotData));
            }
            for (let i = 1; i <= 9; i++) {
                const d = slotData[i];
                const isAvail = d.status === 'available';
                const isActive = (activeSlot === i);
                let cardClass = isActive ? 'active' : d.status;
                let statusText = isActive ? '⚙️ Processing...' : (isAvail ? 'Empty' : escapeHtml(d.item || d.uid || ''));
                container.innerHTML += `
                    <div class="slot-card ${cardClass}" id="slotCard-${i}" onclick="selectSlot(${i})">
                        <div class="slot-number">Slot ${i}</div>
                        <div class="status-text">${statusText}</div>
                    </div>`;
            }
            if (selectedSlotId) {
                const el = document.getElementById(`slotCard-${selectedSlotId}`);
                if (el && !el.classList.contains('active')) el.classList.add('selected');
            }
            document.getElementById('gridPanel').classList.toggle('busy', isSystemBusy);
        }

        function selectSlot(id) {
            if (isSystemBusy) return;
            document.querySelectorAll('.slot-card').forEach(el => el.classList.remove('selected'));
            const card = document.getElementById(`slotCard-${id}`);
            if (card) card.classList.add('selected');
            selectedSlotId = id;
            const d = slotData[id];
            document.getElementById('uidInput').value = (d && d.uid) ? d.uid : '';
        }

        // ── SYNC GRID FROM PI ──────────────────────────────────────────────────
        function syncGridFromPi(piDb) {
            if (!piDb || typeof piDb !== 'object') return;
            for (let i = 1; i <= 9; i++) {
                const info = piDb[`slot_${i}`] || { status: 'Available' };
                slotData[i] = {
                    uid: info.status === 'Occupied' ? info.uid : null,
                    item: info.status === 'Occupied' ? (info.item_name || info.uid) : null,
                    status: info.status === 'Occupied' ? 'occupied' : 'available'
                };
            }
            localStorage.setItem('warehouseDataV2', JSON.stringify(slotData));
            initGrid();
        }

        // ── STATUS DISPLAY ─────────────────────────────────────────────────────
        const STATE_CFG = {
            IDLE: { icon: '✅', text: 'System Ready', cls: 'idle' },
            WAITING_RFID: { icon: '📡', text: 'Waiting for RFID...', cls: 'busy' },
            MOVING: { icon: '🚗', text: 'Moving...', cls: 'busy' },
            ERROR: { icon: '🔴', text: 'System Error', cls: 'error' },
            DISCONNECTED: { icon: '🔌', text: 'PLC Disconnected', cls: '' },
            MAINTENANCE: { icon: '🛠️', text: 'System Maintenance', cls: 'error' },
        };

        function setStatusDisplay(state, sub) {
            const cfg = STATE_CFG[state] || STATE_CFG.IDLE;
            document.getElementById('sysStatusIcon').textContent = cfg.icon;
            document.getElementById('sysStatusText').textContent = cfg.text;
            document.getElementById('sysStatusSub').textContent = sub || '';
            const box = document.getElementById('sysStatusBox');
            box.className = 'sys-status-box ' + cfg.cls;
        }

        function updateStatusBar() {
            const badge = document.getElementById('statusBadge');
            badge.textContent = isSystemBusy ? 'RUNNING' : 'READY';
            badge.className = isSystemBusy ? 'bg-orange' : 'bg-green';
            const tBadge = document.getElementById('targetSlotBadge');
            tBadge.textContent = activeSlot ? `Slot ${activeSlot}` : 'N/A';
            tBadge.style.background = activeSlot ? '#f39c12' : '#555';
        }

        function updateButtons() {
            const off = !isPlcConnected || isSystemBusy || isMaintenanceMode;
            document.getElementById('importBtn').disabled = off;
            document.getElementById('exportBtn').disabled = off;
        }

        // ── HỦY THAO TÁC ──────────────────────────────────────────────────────
        function cancelAction() {
            Swal.fire({
                title: 'Xác nhận hủy?',
                html: `Bạn có chắc muốn <b>hủy thao tác</b> không?<br><small style="color:#e74c3c;">Hệ thống sẽ dừng lại ngay lập tức.</small>`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#c0392b',
                cancelButtonColor: '#555',
                confirmButtonText: '✖ Hủy thao tác',
                cancelButtonText: 'Tiếp tục'
            }).then(result => {
                if (!result.isConfirmed) return;
                _doCancelOperation();
            });
        }

        function _doCancelOperation() {
            _cancelRequested = true;
            _dialogPhase = null;
            // Gửi lệnh hủy tới backend
            if (mqttClient && mqttClient.connected) {
                mqttClient.publish('warehouse/command', JSON.stringify({ action: 'EMERGENCY_RESET' }));
                mqttClient.publish('warehouse/cancel_operation', JSON.stringify({ reason: 'user_cancel' }));
            }
            sessionStorage.removeItem('_imp');
            sessionStorage.removeItem('_exp');
            isSystemBusy = false;
            activeSlot = null;
            currentAction = null;
            setStatusDisplay('IDLE');
            updateStatusBar();
            updateButtons();
            initGrid();
            Swal.fire({
                title: 'Đã hủy thao tác!',
                text: 'Lệnh dừng đã được gửi tới hệ thống.',
                icon: 'info',
                timer: 2500,
                showConfirmButton: false
            });
        }

        // ── DIALOG PHASE 1: Chờ RFID ──────────────────────────────────────────
        function showRfidWaitingDialog(slotNum) {
            _dialogPhase = 'waiting_rfid';
            Swal.fire({
                title: '📡 Quét thẻ RFID',
                html: `
                    <div style="margin-bottom:12px; font-size:15px;">
                        Đặt thẻ RFID vào đầu đọc để xác nhận hàng nhập.<br>
                        <small style="color:#aaa;">Robot sẽ di chuyển đến <b>Slot ${slotNum}</b> sau khi quét thành công.</small>
                    </div>
                    <div style="font-size:40px; animation: pulse-rfid 1s infinite;">📟</div>
                    <style>
                        @keyframes pulse-rfid { 0%,100%{transform:scale(1);} 50%{transform:scale(1.15);} }
                    </style>`,
                footer: `<button class="swal-cancel-btn" onclick="cancelAction()">✖ Hủy thao tác</button>`,
                allowOutsideClick: false,
                allowEscapeKey: false,
                showConfirmButton: false,
                didOpen: () => Swal.showLoading()
            });
        }

        // ── DIALOG PHASE 2: RFID thành công → đang vận chuyển ────────────────
        function showMovingDialog(slotNum, uid) {
            _dialogPhase = 'moving';
            Swal.fire({
                title: '🚗 Đang vận chuyển...',
                html: `
                    <div style="margin-bottom:8px;">
                        Robot đang di chuyển đến <b>Slot ${slotNum}</b>.<br>
                        <small style="color:#aaa;">Thẻ RFID: <code>${uid}</code></small>
                    </div>
                    <small style="color:#aaa;">Dialog sẽ tự đóng khi PLC xác nhận hoàn thành.</small>`,
                footer: `<button class="swal-cancel-btn" onclick="cancelAction()">✖ Hủy thao tác</button>`,
                allowOutsideClick: false,
                allowEscapeKey: false,
                showConfirmButton: false,
                didOpen: () => Swal.showLoading()
            });
        }

        // ── DIALOG PHASE 2b: Export đang vận chuyển ──────────────────────────
        function showExportMovingDialog(slotLabel) {
            _dialogPhase = 'moving';
            Swal.fire({
                title: '📤 Đang xuất hàng...',
                html: `Robot đang di chuyển đến <b>${slotLabel || '...'}</b>.<br>
                       <small style="color:#aaa;">Dialog sẽ tự đóng khi PLC xác nhận hoàn thành.</small>`,
                footer: `<button class="swal-cancel-btn" onclick="cancelAction()">✖ Hủy thao tác</button>`,
                allowOutsideClick: false,
                allowEscapeKey: false,
                showConfirmButton: false,
                didOpen: () => Swal.showLoading()
            });
        }

        // ── XỬ LÝ KẾT QUẢ RFID TỪ BACKEND ───────────────────────────────────
        function handleRfidResult(data) {
            if (_dialogPhase !== 'waiting_rfid') return;
            if (data.success) {
                // Quét thành công → chuyển sang dialog vận chuyển
                showMovingDialog(data.slot, data.uid);
            } else {
                // Quét thất bại → dừng ngay, báo lỗi
                _dialogPhase = null;
                sessionStorage.removeItem('_imp');
                isSystemBusy = false;
                activeSlot = null;
                currentAction = null;
                setStatusDisplay('ERROR', 'RFID scan failed');
                updateStatusBar();
                updateButtons();
                initGrid();
                Swal.fire({
                    title: '❌ Quét thẻ thất bại!',
                    html: `<b style="color:#e74c3c;">${data.message || 'Không đọc được thẻ RFID.'}</b><br>
                           <small>Thao tác đã bị dừng. Vui lòng thử lại.</small>`,
                    icon: 'error',
                    confirmButtonText: 'Đóng',
                    confirmButtonColor: '#e74c3c'
                }).then(() => {
                    setStatusDisplay('IDLE');
                    updateStatusBar();
                });
            }
        }

        // ── MQTT MESSAGES FROM PI ─────────────────────────────────────────────
        function handleRobotState(data) {
            const state = (data.state || 'IDLE').toUpperCase();
            const slot = data.slot && data.slot !== 'N/A' ? parseInt(data.slot) : null;

            activeSlot = (state !== 'IDLE') ? slot : null;
            isSystemBusy = (state !== 'IDLE');

            if (state === 'IDLE') {
                currentAction = null;
                sessionStorage.removeItem('_imp');
                sessionStorage.removeItem('_exp');
            }

            const sub = slot ? `Slot ${slot}` : '';
            if (state === 'IDLE' && isMaintenanceMode) {
                setStatusDisplay('MAINTENANCE', 'Manual control active');
            } else {
                setStatusDisplay(state, sub);
            }
            updateStatusBar();
            updateButtons();
            initGrid();
        }

        function handleAck(data) {
            const action = typeof data === 'object' ? (data.action || '') : '';
            if (action === 'RESET') {
                // Đã hủy thành công — bỏ qua, _doCancelOperation đã xử lý UI
                return;
            }
            const slot = typeof data === 'object' && data.slot ? `Slot ${data.slot}` : '';
            const uid = typeof data === 'object' && data.uid ? `UID: ${data.uid}` : '';
            const msg = [slot, uid].filter(Boolean).join(' — ') || 'Thao tác thành công!';

            isSystemBusy = false;
            activeSlot = null;
            currentAction = null;
            _dialogPhase = null;
            setStatusDisplay('IDLE');
            updateStatusBar();
            updateButtons();

            if (typeof data === 'object' && data.slot) {
                const sid = parseInt(data.slot);
                if (action === 'IMPORT' && data.uid) {
                    slotData[sid] = { uid: data.uid, item: data.item || data.uid || '', status: 'occupied' };
                } else if (action === 'EXPORT') {
                    slotData[sid] = { uid: null, status: 'available' };
                }
                localStorage.setItem('warehouseDataV2', JSON.stringify(slotData));
            }
            initGrid();
            document.getElementById('uidInput').value = '';
            selectedSlotId = null;

            if (action === 'IMPORT' || action === 'EXPORT') {
                const key = action === 'IMPORT' ? '_imp' : '_exp';
                const title = action === 'IMPORT' ? '✅ Nhập hàng thành công!' : '✅ Xuất hàng thành công!';
                sessionStorage.removeItem(key);
                if (Swal.isVisible()) {
                    Swal.hideLoading();
                    Swal.update({ title, html: `<span style="font-size:40px">✅</span><br><b>${msg}</b>`, footer: '', showConfirmButton: false });
                    setTimeout(() => Swal.close(), 3000);
                } else {
                    Swal.fire({ title, text: msg, icon: 'success', timer: 3000, showConfirmButton: false });
                }
            }
        }

        // ── PROCESS ACTION (AUTO MODE) ─────────────────────────────────────────
        function processAction(actionType) {
            if (!isPlcConnected) { Swal.fire('Cảnh báo', 'Vui lòng kết nối PLC trước!', 'warning'); return; }
            if (isSystemBusy) { Swal.fire('Thông báo', 'Hệ thống đang bận, vui lòng chờ!', 'info'); return; }

            const uid = document.getElementById('uidInput').value.trim();

            if (actionType === 'EXPORT' && !uid && !selectedSlotId) {
                Swal.fire('Thông báo', 'Vui lòng chọn slot trên bản đồ hoặc nhập UID!', 'warning');
                return;
            }

            if (actionType === 'IMPORT') {
                // Hiện dialog xác nhận thông tin trước khi gửi lệnh
                _showImportConfirmDialog(uid);
            } else {
                // EXPORT: gửi lệnh ngay, hiện dialog đang vận chuyển
                _startExport(uid);
            }
        }

        function _showImportConfirmDialog(uid) {
            Swal.fire({
                title: '📥 Xác nhận nhập hàng',
                html: `
                    <div style="text-align:left; margin-bottom:8px;">
                        <b>Thông tin sản phẩm:</b><br>
                        <span style="font-family:monospace; background:#eee; padding:4px 10px; border-radius:4px; display:inline-block; margin-top:4px;">
                            ${uid ? escapeHtml(uid) : '<em style="color:#aaa;">Không có (sẽ dùng RFID)</em>'}
                        </span>
                    </div>
                    <div style="font-size:13px; color:#555;">
                        Sau khi nhấn <b>"Nhập hàng"</b>, hệ thống sẽ:<br>
                        1. Yêu cầu quét thẻ RFID<br>
                        2. Robot di chuyển đến slot trống
                    </div>`,
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#00529c',
                cancelButtonColor: '#888',
                confirmButtonText: '📥 Nhập hàng',
                cancelButtonText: '✖ Hủy'
            }).then(result => {
                if (!result.isConfirmed) return;
                _startImport(uid);
            });
        }

        function _startImport(uid) {
            _cancelRequested = false;
            isSystemBusy = true;
            currentAction = 'IMPORT';

            const cmd = { action: 'IMPORT', uid: uid, item: uid };
            if (mqttClient && mqttClient.connected) {
                mqttClient.publish('warehouse/command', JSON.stringify(cmd));
            }
            sessionStorage.setItem('_imp', '1');

            // Hiện dialog chờ RFID — slot sẽ được update khi nhận WAITING_RFID state
            setStatusDisplay('WAITING_RFID', '');
            updateStatusBar();
            updateButtons();
            // Dialog chờ RFID (slot # sẽ được biết từ robot_state)
            showRfidWaitingDialog('...');
        }

        function _startExport(uid) {
            _cancelRequested = false;
            const cmd = { action: 'EXPORT', uid: uid, item: uid };
            if (selectedSlotId) cmd.slot_id = selectedSlotId;

            isSystemBusy = true;
            currentAction = 'EXPORT';
            const label = selectedSlotId ? `Slot ${selectedSlotId}` : (uid ? uid : '...');
            setStatusDisplay('MOVING', label);
            updateStatusBar();
            updateButtons();

            if (mqttClient && mqttClient.connected) {
                mqttClient.publish('warehouse/command', JSON.stringify(cmd));
            }
            sessionStorage.setItem('_exp', label);
            showExportMovingDialog(label);
        }

        // ── PLC / MQTT ─────────────────────────────────────────────────────────
        function updatePlcUI() {
            const badge = document.getElementById('plcBadge');
            badge.className = isPlcConnected ? 'bg-green' : 'bg-red';
            badge.innerText = isPlcConnected ? 'CONNECTED' : 'DISCONNECTED';
            if (isPlcConnected) setStatusDisplay('IDLE');
            updateButtons();
        }

        function connectMQTT() {
            if (typeof mqtt === 'undefined') { Swal.fire('Lỗi', 'Không tải được thư viện MQTT', 'error'); return; }
            mqttClient = mqtt.connect(MQTT_CFG.url, { ...MQTT_CFG.options, clientId: getClientId('warehouse') });

            mqttClient.on('connect', () => {
                isPlcConnected = true;
                updatePlcUI();
                mqttClient.subscribe([
                    'warehouse/robot_state',
                    'warehouse/ack',
                    'warehouse/error',
                    'warehouse/slot_data',
                    'warehouse/rfid_result',
                    'warehouse/maintenance_mode'
                ]);
                setTimeout(() => mqttClient.publish('warehouse/command', JSON.stringify({ action: 'GET_STATUS' })), 600);
            });

            mqttClient.on('disconnect', () => { isPlcConnected = false; updatePlcUI(); });
            mqttClient.on('error', () => { isPlcConnected = false; updatePlcUI(); });

            mqttClient.on('message', (t, m) => {
                let data;
                try { data = JSON.parse(m.toString()); } catch (e) { data = m.toString(); }

                if (t === 'warehouse/robot_state') {
                    handleRobotState(data);
                    // Cập nhật dialog chờ RFID với số slot thực tế
                    if (_dialogPhase === 'waiting_rfid' && data.slot && data.slot !== 'N/A') {
                        const slotNum = data.slot;
                        if (Swal.isVisible()) {
                            Swal.update({
                                title: `📡 Quét thẻ RFID — Slot ${slotNum}`,
                            });
                        }
                    }
                }
                if (t === 'warehouse/ack') handleAck(data);
                if (t === 'warehouse/slot_data') syncGridFromPi(data);
                if (t === 'warehouse/rfid_result') handleRfidResult(data);
                if (t === 'warehouse/maintenance_mode') {
                    isMaintenanceMode = !!data.active;
                    if (isMaintenanceMode) {
                        setStatusDisplay('MAINTENANCE', 'Manual control active');
                    } else if (!isSystemBusy) {
                        setStatusDisplay('IDLE');
                    }
                    updateButtons();
                }
                if (t === 'warehouse/error') {
                    const msg = typeof data === 'string' ? data : (data.message || JSON.stringify(data));
                    sessionStorage.removeItem('_imp');
                    sessionStorage.removeItem('_exp');
                    isSystemBusy = false;
                    activeSlot = null;
                    currentAction = null;
                    _dialogPhase = null;
                    setStatusDisplay('ERROR', msg);
                    updateStatusBar();
                    updateButtons();
                    initGrid();
                    Swal.fire({
                        title: '❌ Lỗi hệ thống',
                        text: msg,
                        icon: 'error',
                        confirmButtonColor: '#e74c3c'
                    });
                }
            });
        }

        function escapeHtml(str) {
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        window.addEventListener('beforeunload', () => { if (mqttClient) mqttClient.end(true); });

        window.onload = () => {
            const user = JSON.parse(sessionStorage.getItem('loggedUser') || '{}');
            if (user && user.username) document.getElementById('userName').textContent = user.username;

            initGrid();
            updatePlcUI();
            // Khôi phục dialog nếu trang reload trong lúc thao tác
            if (sessionStorage.getItem('_imp')) {
                isSystemBusy = true;
                currentAction = 'IMPORT';
                setStatusDisplay('MOVING');
                updateStatusBar();
                updateButtons();
                _dialogPhase = 'moving';
                showRfidWaitingDialog('...');
            } else if (sessionStorage.getItem('_exp')) {
                isSystemBusy = true;
                currentAction = 'EXPORT';
                setStatusDisplay('MOVING');
                updateStatusBar();
                updateButtons();
                showExportMovingDialog(sessionStorage.getItem('_exp'));
            }
            connectMQTT();
            timeInterval = setInterval(() => {
                document.getElementById('lastUpdate').innerText = new Date().toLocaleTimeString('vi-VN');
            }, 1000);
        };
    </script>
</body>

</html>
