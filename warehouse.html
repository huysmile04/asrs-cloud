<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warehouse Map - HCMUTE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: #f4f7f6; color: #333; padding: 20px; display: flex; flex-direction: column; align-items: center; }

        /* === HEADER === */
        header { background: #e5e5e5; padding: 15px 40px; border-bottom: 2px solid #ccc; display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 1100px; border-radius: 16px 16px 0 0; }
        .logo img { height: 40px; margin-right: 10px; }
        .user-info { font-weight: bold; }
        .btn-header { color: white; border: none; padding: 8px 20px; font-size: 14px; border-radius: 4px; cursor: pointer; }
        .back-btn { background: #556270; margin-right: 10px; }
        .logout-btn { background: #c9302c; }
        .back-btn:hover { background: #3f464e; }
        .logout-btn:hover { background: #ac2925; }

        /* === DASHBOARD === */
        .dashboard-container { width: 100%; max-width: 1100px; background: #fff; border-radius: 0 0 16px 16px; box-shadow: 0 8px 25px rgba(0,0,0,0.08); overflow: hidden; }
        .status-bar { display: flex; justify-content: space-between; background: #1a252f; color: white; padding: 15px 30px; font-weight: bold; font-size: 14px; flex-wrap: wrap; gap: 8px; }
        .status-item span { font-weight: normal; margin-left: 8px; padding: 4px 10px; border-radius: 20px; }

        .main-content { display: flex; padding: 30px; gap: 40px; }

        /* === CONTROL PANEL === */
        .control-panel { flex: 1; background: #fdfdfd; border: 1px solid #eee; border-radius: 12px; padding: 25px; display: flex; flex-direction: column; gap: 15px; }
        .control-panel h3 { color: #00529c; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .instruction { font-size: 13px; color: #666; background: #eef2f5; padding: 12px 15px; border-radius: 8px; border-left: 4px solid #3498db; line-height: 1.6; }
        .input-group label { font-weight: bold; font-size: 14px; display: block; margin-bottom: 5px; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; outline: none; font-size: 14px; }

        .btn { padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: white; transition: 0.2s; text-align: center; font-size: 14px; }
        .btn:hover:not(:disabled) { opacity: 0.9; transform: translateY(-2px); }
        .btn:disabled { background-color: #ddd !important; color: #999 !important; cursor: not-allowed; transform: none !important; }
        .connect-btn { width: 100%; font-size: 15px; }
        .action-buttons { display: flex; gap: 15px; }
        .action-buttons .btn { flex: 1; padding: 14px; font-size: 15px; }

        .bg-green  { background-color: #2ecc71; }
        .bg-red    { background-color: #e74c3c; }
        .bg-blue   { background-color: #00529c; }
        .bg-orange { background-color: #f39c12; }

        .cancel-btn { width: 100%; display: none; background: #c0392b; font-size: 15px; padding: 13px; }
        .cancel-btn:hover:not(:disabled) { background: #a93226; }

        /* === STATUS BOX === */
        .sys-status-box {
            border: 2px solid #ccc; border-radius: 10px; padding: 16px 12px;
            text-align: center; transition: border-color 0.4s, background 0.4s;
            background: #f8f9fa;
        }
        .sys-status-box.idle    { border-color: #2ecc71; background: #f0fff5; }
        .sys-status-box.busy    { border-color: #f39c12; background: #fffbf0; }
        .sys-status-box.error   { border-color: #e74c3c; background: #fff5f5; }
        .sys-status-icon { font-size: 30px; margin-bottom: 6px; }
        .sys-status-text { font-weight: 800; font-size: 14px; color: #222; margin-bottom: 3px; }
        .sys-status-sub  { font-size: 12px; color: #888; min-height: 16px; }

        /* === GRID === */
        .grid-panel { flex: 2; }
        .grid-panel.busy .slot-card { pointer-events: none; }
        .grid-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }

        .slot-card { background: #fff; border: 2px solid #eee; border-radius: 12px; padding: 20px 15px; text-align: center; cursor: pointer; transition: 0.3s; }
        .slot-card:hover:not(.active) { transform: translateY(-5px); box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
        .slot-card.available { border-top: 5px solid #2ecc71; background-color: #f9fffb; }
        .slot-card.occupied  { border-top: 5px solid #e74c3c; background-color: #fffaf9; }
        .slot-card.selected  { border: 3px solid #00529c !important; background-color: #eef5ff; box-shadow: 0 0 0 4px rgba(0,82,156,0.12); }

        .slot-card.active {
            border: 3px solid #f39c12 !important;
            border-top: 5px solid #f39c12 !important;
            background-color: #fffdf0 !important;
            animation: pulse-slot 1.2s ease-in-out infinite;
        }
        @keyframes pulse-slot {
            0%, 100% { box-shadow: 0 0 0 0 rgba(243,156,18,0.5); }
            50%       { box-shadow: 0 0 0 10px rgba(243,156,18,0); }
        }

        .slot-number { font-size: 18px; font-weight: bold; color: #333; margin-bottom: 8px; }
        .available .status-text { color: #2ecc71; font-weight: bold; font-size: 13px; }
        .occupied  .status-text { color: #e74c3c; font-size: 12px; font-family: monospace; }
        .active    .status-text { color: #f39c12; font-weight: bold; font-size: 12px; }

        /* === RESPONSIVE === */
        @media (max-width: 850px) {
            .main-content { flex-direction: column; gap: 20px; }
            .status-bar { justify-content: center; font-size: 13px; }
            .grid-panel { width: 100%; }
        }
        @media (max-width: 600px) {
            body { padding: 10px; }
            header { padding: 10px 14px; border-radius: 12px 12px 0 0; }
            .logo img { height: 32px; }
            .btn-header { padding: 7px 12px; font-size: 12px; }
            .main-content { padding: 16px; gap: 16px; }
            .control-panel { padding: 18px; }
            .slot-card { padding: 14px 8px; }
            .slot-number { font-size: 15px; }
        }
        @media (max-width: 420px) {
            .grid-container { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .status-bar { padding: 10px 14px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo"><a href="index.html"><img src="ute_logo.png" alt="HCMUTE Logo"></a></div>
        <div class="user-info">Xin chào, Admin</div>
        <div>
            <button class="btn-header back-btn" onclick="location.href='dashboard.html'">← Quay lại</button>
            <button class="btn-header logout-btn" onclick="logout()">Đăng xuất</button>
        </div>
    </header>

    <div class="dashboard-container">
        <div class="status-bar">
            <div class="status-item">PLC S7-1200: <span id="plcBadge" class="bg-red">DISCONNECTED</span></div>
            <div class="status-item">STATUS: <span id="statusBadge" class="bg-green">IDLE</span></div>
            <div class="status-item">TARGET SLOT: <span id="targetSlotBadge" style="background:#555;">N/A</span></div>
            <div class="status-item">Last Update: <span id="lastUpdate" style="background:#555;">--:--:--</span></div>
        </div>

        <div class="main-content">

            <!-- CONTROL PANEL -->
            <div class="control-panel">
                <h3>🤖 Điều Khiển Tự Động</h3>

                <div class="instruction">
                    📥 <strong>IMPORT:</strong> Nhấn nút → Pi tự chọn ô gần nhất → Quét thẻ RFID (hoặc nhập UID).<br>
                    📤 <strong>EXPORT:</strong> Click vào ô cần xuất trên bản đồ → Nhấn EXPORT.
                </div>

                <div class="input-group">
                    <label>Kết nối PLC S7-1200:</label>
                    <button class="btn connect-btn bg-red" id="connectBtn" onclick="togglePlc()">🔴 Kết nối PLC</button>
                </div>

                <!-- HỘP TRẠNG THÁI HỆ THỐNG -->
                <div class="sys-status-box" id="sysStatusBox">
                    <div class="sys-status-icon" id="sysStatusIcon">🔌</div>
                    <div class="sys-status-text" id="sysStatusText">Chưa kết nối PLC</div>
                    <div class="sys-status-sub"  id="sysStatusSub"></div>
                </div>

                <div class="input-group">
                    <label>Thông tin sản phẩm (để trống = đọc RFID tự động):</label>
                    <input type="text" id="uidInput" placeholder="Nhập thông tin sản phẩm hoặc để trống...">
                </div>

                <div class="action-buttons">
                    <button class="btn bg-blue" id="importBtn" onclick="processAction('IMPORT')" disabled>📥 IMPORT</button>
                    <button class="btn bg-red"  id="exportBtn" onclick="processAction('EXPORT')" disabled>📤 EXPORT</button>
                </div>
                <button class="btn cancel-btn" id="cancelBtn" onclick="cancelAction()">⛔ Hủy thao tác</button>
            </div>

            <!-- WAREHOUSE GRID -->
            <div class="grid-panel" id="gridPanel">
                <div class="grid-container" id="gridContainer"></div>
            </div>

        </div>
    </div>

    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/mqtt@5.3.4/dist/mqtt.min.js" crossorigin="anonymous"></script>
    <script>
        authGuard();

        // ── STATE ──────────────────────────────────────────────────────────────
        let isPlcConnected = localStorage.getItem('plcConnected') === 'true';
        let isSystemBusy   = false;
        let activeSlot     = null;   // slot đang được Pi vận hành
        let selectedSlotId = null;   // slot user đang chọn để EXPORT
        let currentAction  = null;   // 'IMPORT' | 'EXPORT' | null
        let mqttClient     = null;
        let timeInterval   = null;

        const defaultData = Object.fromEntries(
            Array.from({length: 9}, (_, i) => [i + 1, { uid: null, status: 'available' }])
        );
        let slotData = JSON.parse(localStorage.getItem('warehouseDataV2')) || defaultData;

        // ── GRID ───────────────────────────────────────────────────────────────
        function initGrid() {
            const container = document.getElementById('gridContainer');
            container.innerHTML = '';
            if (!slotData || !slotData[1]) {
                slotData = JSON.parse(JSON.stringify(defaultData));
                localStorage.setItem('warehouseDataV2', JSON.stringify(slotData));
            }
            for (let i = 1; i <= 9; i++) {
                const d = slotData[i];
                const isAvail = d.status === 'available';
                const isActive = (activeSlot === i);
                let cardClass = isActive ? 'active' : d.status;
                let statusText = isActive ? '⚙️ Đang xử lý...' : (isAvail ? 'Trống' : 'UID: ' + escapeHtml(d.uid));
                container.innerHTML += `
                    <div class="slot-card ${cardClass}" id="slotCard-${i}" onclick="selectSlot(${i})">
                        <div class="slot-number">Slot ${i}</div>
                        <div class="status-text">${statusText}</div>
                    </div>`;
            }
            if (selectedSlotId) {
                const el = document.getElementById(`slotCard-${selectedSlotId}`);
                if (el && !el.classList.contains('active')) el.classList.add('selected');
            }
            document.getElementById('gridPanel').classList.toggle('busy', isSystemBusy);
        }

        function selectSlot(id) {
            if (isSystemBusy) return;
            document.querySelectorAll('.slot-card').forEach(el => el.classList.remove('selected'));
            const card = document.getElementById(`slotCard-${id}`);
            if (card) card.classList.add('selected');
            selectedSlotId = id;
            const d = slotData[id];
            document.getElementById('uidInput').value = (d && d.uid) ? d.uid : '';
        }

        // ── SYNC GRID TỪ PI ───────────────────────────────────────────────────
        function syncGridFromPi(piDb) {
            if (!piDb || typeof piDb !== 'object') return;
            for (let i = 1; i <= 9; i++) {
                const info = piDb[`slot_${i}`] || { status: 'Available' };
                slotData[i] = {
                    uid:    info.status === 'Occupied' ? info.uid : null,
                    status: info.status === 'Occupied' ? 'occupied' : 'available'
                };
            }
            localStorage.setItem('warehouseDataV2', JSON.stringify(slotData));
            initGrid();
        }

        // ── STATUS DISPLAY ─────────────────────────────────────────────────────
        const STATE_CFG = {
            IDLE:          { icon: '🟢', text: 'Hệ thống sẵn sàng',          cls: 'idle'  },
            WAITING_RFID:  { icon: '📡', text: 'Đang chờ quét thẻ RFID...',  cls: 'busy'  },
            MOVING:        { icon: '🔄', text: 'Đang di chuyển...',           cls: 'busy'  },
            ERROR:         { icon: '🔴', text: 'Lỗi hệ thống',               cls: 'error' },
            DISCONNECTED:  { icon: '🔌', text: 'Chưa kết nối PLC',           cls: ''      },
        };

        function setStatusDisplay(state, sub) {
            const cfg = STATE_CFG[state] || STATE_CFG.IDLE;
            document.getElementById('sysStatusIcon').textContent = cfg.icon;
            document.getElementById('sysStatusText').textContent = cfg.text;
            document.getElementById('sysStatusSub').textContent  = sub || '';
            const box = document.getElementById('sysStatusBox');
            box.className = 'sys-status-box ' + cfg.cls;
        }

        function updateStatusBar() {
            const badge = document.getElementById('statusBadge');
            badge.textContent  = isSystemBusy ? 'BUSY' : 'IDLE';
            badge.className    = isSystemBusy ? 'bg-orange' : 'bg-green';
            const tBadge = document.getElementById('targetSlotBadge');
            tBadge.textContent = activeSlot ? `Slot ${activeSlot}` : 'N/A';
            tBadge.style.background = activeSlot ? '#f39c12' : '#555';
        }

        function updateButtons() {
            const off = !isPlcConnected || isSystemBusy;
            document.getElementById('importBtn').disabled = off;
            document.getElementById('exportBtn').disabled = off;
            const cancelBtn = document.getElementById('cancelBtn');
            cancelBtn.style.display = (isSystemBusy && isPlcConnected) ? 'block' : 'none';
            if (currentAction === 'IMPORT') cancelBtn.textContent = '⛔ Hủy nhập hàng';
            else if (currentAction === 'EXPORT') cancelBtn.textContent = '⛔ Hủy xuất hàng';
            else cancelBtn.textContent = '⛔ Hủy thao tác';
        }

        // ── XỬ LÝ MQTT MESSAGES TỪ PI ─────────────────────────────────────────
        function handleRobotState(data) {
            const state = (data.state || 'IDLE').toUpperCase();
            const slot  = data.slot && data.slot !== 'N/A' ? parseInt(data.slot) : null;
            const msg   = data.message || '';

            activeSlot     = (state !== 'IDLE') ? slot : null;
            isSystemBusy   = (state !== 'IDLE');
            if (state === 'IDLE') currentAction = null;

            const sub = slot ? `Slot ${slot}` : '';
            setStatusDisplay(state, sub);
            updateStatusBar();
            updateButtons();
            initGrid();
        }

        function cancelAction() {
            const label = currentAction === 'IMPORT' ? 'nhập hàng' : currentAction === 'EXPORT' ? 'xuất hàng' : 'thao tác';
            Swal.fire({
                title: 'Xác nhận hủy?',
                text: `Bạn có chắc muốn hủy ${label} không? Robot sẽ dừng ngay lập tức.`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#c0392b',
                cancelButtonColor: '#555',
                confirmButtonText: 'Hủy thao tác',
                cancelButtonText: 'Tiếp tục'
            }).then(result => {
                if (!result.isConfirmed) return;
                if (mqttClient && mqttClient.connected) {
                    mqttClient.publish('warehouse/command', JSON.stringify({ action: 'EMERGENCY_RESET' }));
                }
                isSystemBusy  = false;
                activeSlot    = null;
                currentAction = null;
                setStatusDisplay('IDLE');
                updateStatusBar();
                updateButtons();
                initGrid();
                Swal.fire({ title: 'Đã hủy!', text: 'Lệnh reset đã được gửi tới Pi.', icon: 'info', timer: 2500, showConfirmButton: false });
            });
        }

        function handleAck(data) {
            const action = typeof data === 'object' ? (data.action || '') : '';
            const slot   = typeof data === 'object' && data.slot ? `Slot ${data.slot}` : '';
            const uid    = typeof data === 'object' && data.uid  ? `UID: ${data.uid}`  : '';
            const msg    = [slot, uid].filter(Boolean).join(' — ') || 'Thao tac thanh cong!';

            isSystemBusy  = false;
            activeSlot    = null;
            currentAction = null;
            setStatusDisplay('IDLE');
            updateStatusBar();
            updateButtons();

            // Sync grid nếu Pi gửi slot info kèm theo
            if (typeof data === 'object' && data.slot) {
                const sid = parseInt(data.slot);
                if (action === 'IMPORT' && data.uid) {
                    slotData[sid] = { uid: data.uid, status: 'occupied' };
                } else if (action === 'EXPORT') {
                    slotData[sid] = { uid: null, status: 'available' };
                }
                localStorage.setItem('warehouseDataV2', JSON.stringify(slotData));
            }
            initGrid();
            document.getElementById('uidInput').value = '';
            selectedSlotId = null;

            Swal.fire({ title: action ? `${action} thành công!` : 'Hoàn thành!',
                        text: msg, icon: 'success', timer: 3000, showConfirmButton: false });
        }

        // ── PROCESS ACTION (AUTO MODE) ─────────────────────────────────────────
        function processAction(actionType) {
            if (!isPlcConnected) { Swal.fire('Cảnh báo', 'Vui lòng kết nối PLC trước!', 'warning'); return; }
            if (isSystemBusy)    { Swal.fire('Thông báo', 'Hệ thống đang bận, vui lòng chờ!', 'info'); return; }

            const uid = document.getElementById('uidInput').value.trim();

            if (actionType === 'EXPORT' && !uid && !selectedSlotId) {
                Swal.fire('Thông báo', 'Hãy click chọn ô cần xuất trên bản đồ hoặc nhập UID!', 'warning');
                return;
            }

            // Gửi lệnh lên Pi — Pi tự quyết định slot cho IMPORT
            const cmd = { action: actionType, uid: uid };
            if (actionType === 'EXPORT' && selectedSlotId) {
                cmd.slot_id = selectedSlotId;
            }

            isSystemBusy  = true;
            currentAction = actionType;
            setStatusDisplay(actionType === 'IMPORT' ? 'WAITING_RFID' : 'MOVING',
                             actionType === 'IMPORT' ? '' : (selectedSlotId ? `Slot ${selectedSlotId}` : ''));
            updateStatusBar();
            updateButtons();

            if (mqttClient && mqttClient.connected) {
                mqttClient.publish('warehouse/command', JSON.stringify(cmd));
            }
        }

        // ── PLC / MQTT ─────────────────────────────────────────────────────────
        function togglePlc() {
            if (!isPlcConnected) {
                isPlcConnected = true;
                localStorage.setItem('plcConnected', 'true');
                connectMQTT();
                timeInterval = setInterval(() => {
                    document.getElementById('lastUpdate').innerText = new Date().toLocaleTimeString('vi-VN');
                }, 1000);
                Swal.fire({ title: 'Đang kết nối...', text: 'PLC S7-1200 đang khởi tạo.', icon: 'info', timer: 2000, showConfirmButton: false });
            } else {
                Swal.fire('Thông báo', 'Vui lòng Logout để ngắt kết nối an toàn.', 'info');
            }
            updatePlcUI();
        }

        function updatePlcUI() {
            const btn   = document.getElementById('connectBtn');
            const badge = document.getElementById('plcBadge');
            btn.className  = `btn connect-btn ${isPlcConnected ? 'bg-green' : 'bg-red'}`;
            btn.innerHTML  = isPlcConnected ? '🟢 PLC Đang Kết Nối' : '🔴 Kết nối PLC';
            badge.className = isPlcConnected ? 'bg-green' : 'bg-red';
            badge.innerText = isPlcConnected ? 'CONNECTED' : 'DISCONNECTED';
            if (isPlcConnected) setStatusDisplay('IDLE');
            updateButtons();
        }

        function connectMQTT() {
            if (typeof mqtt === 'undefined') { Swal.fire('Lỗi', 'Không tải được thư viện MQTT', 'error'); return; }
            mqttClient = mqtt.connect(MQTT_CFG.url, { ...MQTT_CFG.options, clientId: getClientId('warehouse') });

            mqttClient.on('connect', () => {
                mqttClient.subscribe(['warehouse/robot_state', 'warehouse/ack', 'warehouse/error', 'warehouse/slot_data']);
                // Yêu cầu Pi gửi trạng thái slot hiện tại
                setTimeout(() => mqttClient.publish('warehouse/command', JSON.stringify({ action: 'GET_STATUS' })), 600);
            });

            mqttClient.on('message', (t, m) => {
                let data;
                try { data = JSON.parse(m.toString()); } catch(e) { data = m.toString(); }

                if (t === 'warehouse/robot_state') handleRobotState(data);
                if (t === 'warehouse/ack')         handleAck(data);
                if (t === 'warehouse/slot_data')   syncGridFromPi(data);
                if (t === 'warehouse/error') {
                    const msg = typeof data === 'string' ? data : (data.message || JSON.stringify(data));
                    isSystemBusy  = false;
                    activeSlot    = null;
                    currentAction = null;
                    setStatusDisplay('ERROR', msg);
                    updateStatusBar();
                    updateButtons();
                    initGrid();
                    Swal.fire('Lỗi thiết bị', msg, 'error');
                }
            });
        }

        function logout() {
            if (mqttClient) mqttClient.end(true);
            doLogout();
        }

        window.addEventListener('beforeunload', () => { if (mqttClient) mqttClient.end(true); });

        window.onload = () => {
            initGrid();
            updatePlcUI();
            if (!isPlcConnected) setStatusDisplay('DISCONNECTED');
            if (isPlcConnected) {
                connectMQTT();
                timeInterval = setInterval(() => {
                    document.getElementById('lastUpdate').innerText = new Date().toLocaleTimeString('vi-VN');
                }, 1000);
            }
        };
    </script>
</body>
</html>
