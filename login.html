<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập hệ thống - HCMUTE</title>
    <style>
        /* Reset CSS */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px; /* Khoảng cách từ trên cùng xuống */
        }

        /* --- Phần Header (Logo và Tên trường) --- */
        .header-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .header-section img {
            height: 120px; /* Điều chỉnh kích thước logo */
            margin-bottom: 20px;
        }

        .header-section h1 {
            font-size: 28px;
            font-weight: bold;
            color: #000000;
            line-height: 1.4;
            text-transform: uppercase;
        }

        /* --- Phần Khối Đăng Nhập (Màu xám) --- */
        .login-box {
            background-color: #dadada; /* Màu nền xám giống thiết kế */
            width: 100%;
            max-width: 800px; /* Độ rộng của khối xám */
            padding: 40px 60px 60px 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .login-box h2 {
            font-size: 40px;
            font-weight: bold;
            color: #000000;
            margin-bottom: 40px;
            letter-spacing: 1px;
        }

        /* Form đăng nhập */
        .login-form {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 25px; /* Khoảng cách giữa các ô input */
        }

        .login-form input {
            width: 100%;
            padding: 18px 20px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            outline: none;
        }

        .login-form input::placeholder {
            color: #000000;
            opacity: 1; /* Hiển thị rõ màu đen cho placeholder như trong ảnh */
        }

        /* Nút đăng nhập */
        .submit-btn {
            background-color: #8cd3f5; /* Màu xanh nước biển nhạt */
            color: #000000;
            font-weight: bold;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            padding: 15px 40px;
            margin-top: 30px;
            cursor: pointer;
            align-self: center; /* Căn giữa nút */
            width: 200px;
        }

        .submit-btn:hover {
            background-color: #75c5ec; /* Đổi màu đậm hơn một chút khi di chuột vào */
        }

        /* Responsive cho điện thoại */
        @media (max-width: 600px) {
            .login-box {
                padding: 30px 20px;
                max-width: 90%;
            }
            .header-section h1 {
                font-size: 20px;
            }
            .login-box h2 {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>

    <div class="header-section">
        <img src="ute_logo.png" alt="Logo HCMUTE">
        <h1>TRƯỜNG ĐẠI HỌC CÔNG NGHỆ KỸ THUẬT<br>TP.HCM</h1>
    </div>

    <div class="login-box">
        <h2>SYSTEM LOGIN</h2>
        
        <form class="login-form" action="#" method="POST" autocomplete="off">
            <input type="text" name="username" placeholder="Tên đăng nhập" autocomplete="off" required>
            <input type="password" name="password" placeholder="Password" autocomplete="off" required>
            
            <button type="submit" class="submit-btn">Đăng nhập</button>
        </form>
    </div>

    <script>
        document.querySelector('.login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.querySelector('input[name="username"]').value;
            const password = document.querySelector('input[name="password"]').value;
            
            // Kiểm tra thông tin đăng nhập (có thể thay đổi theo nhu cầu)
            if (username === 'admin' && password === 'hcmute2026') {
                // Lưu trạng thái đăng nhập
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('username', username);
                
                // Chuyển đến dashboard
                window.location.href = 'dashboard.html';
            } else {
                // Hiển thị thông báo lỗi
                alert('Tên đăng nhập hoặc mật khẩu không đúng!');
            }
        });
    </script>
</body>
</html>
