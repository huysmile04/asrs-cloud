<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AS/RS — HMI Control Panel</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        :root {
            --primary:   #545cd8;
            --primary-d: #3f46c0;
            --success:   #3ac47d;
            --danger:    #d92550;
            --warning:   #f7b924;
            --info:      #16aaff;
            --sidebar:   #343a40;
            --sidebar-d: #2b2f33;
            --body-bg:   #f1f4f6;
            --card-sh:   0 .46875rem 2.1875rem rgba(4,9,20,.03),
                         0 .9375rem 1.40625rem rgba(4,9,20,.03),
                         0 .25rem .53125rem rgba(4,9,20,.05),
                         0 .125rem .1875rem rgba(4,9,20,.03);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; font-family: 'Segoe UI', system-ui, sans-serif; }

        body {
            background: var(--body-bg);
            color: #495057;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* ══ SIDEBAR ════════════════════════════════════ */
        .sidebar {
            width: 240px;
            min-width: 240px;
            background: var(--sidebar);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sb-logo {
            background: var(--sidebar-d);
            padding: 14px 18px;
            border-bottom: 1px solid rgba(255,255,255,.07);
        }
        .sb-logo-title {
            color: #fff;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: .5px;
        }
        .sb-logo-sub {
            color: rgba(255,255,255,.4);
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 2px;
        }

        /* Status block */
        .sb-status {
            padding: 14px 16px;
            border-bottom: 1px solid rgba(255,255,255,.07);
        }
        .sb-section-lbl {
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(255,255,255,.3);
            margin-bottom: 8px;
        }
        .sb-status-row {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,.06);
            border-radius: 4px;
            padding: 7px 10px;
            margin-bottom: 10px;
        }
        .sb-led {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: #6c757d;
            flex-shrink: 0;
            transition: all .3s;
        }
        .sb-led.ready   { background: var(--success); box-shadow: 0 0 7px var(--success); }
        .sb-led.running { background: var(--warning); box-shadow: 0 0 7px var(--warning); animation: blink .9s ease-in-out infinite; }
        .sb-led.stopped { background: var(--danger);  box-shadow: 0 0 7px var(--danger); }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }
        .sb-led-txt { color: #fff; font-size: 13px; font-weight: 600; }

        .btn-sb {
            display: block;
            width: 100%;
            padding: 9px;
            border: none;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: pointer;
            margin-bottom: 6px;
            transition: filter .2s, transform .1s;
        }
        .btn-sb:active { transform: scale(.98); }
        .btn-sb-start { background: var(--success); color: #fff; }
        .btn-sb-start:hover { filter: brightness(1.1); }
        .btn-sb-stop  { background: var(--danger);  color: #fff; }
        .btn-sb-stop:hover  { filter: brightness(1.1); }

        /* Nav items */
        .sb-nav { padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,.07); }
        .sb-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 18px;
            color: rgba(255,255,255,.55);
            font-size: 13px;
            cursor: pointer;
            border-left: 3px solid transparent;
            transition: all .15s;
            text-decoration: none;
        }
        .sb-item:hover { color: #fff; background: rgba(255,255,255,.06); text-decoration: none; }
        .sb-item.active {
            color: #fff;
            background: rgba(84,92,216,.25);
            border-left-color: var(--primary);
        }
        .sb-item i { width: 16px; text-align: center; font-size: 13px; }

        /* Sidebar footer */
        .sb-footer {
            margin-top: auto;
            padding: 12px 16px;
            border-top: 1px solid rgba(255,255,255,.07);
            text-align: center;
        }
        .sb-live {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-bottom: 4px;
        }
        .sb-live-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--success);
            animation: blink .9s ease-in-out infinite;
        }
        .sb-live-txt { font-size: 10px; font-weight: 700; color: var(--success); letter-spacing: 2px; }
        .sb-clock { font-family: 'Courier New', monospace; font-size: 13px; color: rgba(255,255,255,.35); }

        /* ══ MAIN ════════════════════════════════════════ */
        .main-wrap {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            overflow: hidden;
        }

        /* Topbar */
        .topbar {
            background: #fff;
            border-bottom: 1px solid #e9ecef;
            padding: 0 20px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            box-shadow: 0 1px 0 rgba(0,0,0,.04);
        }
        .breadcrumb-wrap {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: #6c757d;
        }
        .breadcrumb-wrap .sep { color: #ced4da; }
        .breadcrumb-wrap .cur { color: var(--primary); font-weight: 600; }
        .topbar-right {
            display: flex;
            align-items: center;
            gap: 18px;
        }
        .notif-btn {
            position: relative;
            color: #868e96;
            font-size: 16px;
            cursor: pointer;
            border: none;
            background: none;
        }
        .notif-badge {
            position: absolute;
            top: -5px; right: -5px;
            background: var(--danger);
            color: #fff;
            font-size: 9px;
            font-weight: 700;
            width: 14px; height: 14px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #495057;
        }
        .user-avatar {
            width: 30px; height: 30px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), #7a7fd4);
            color: #fff;
            font-size: 11px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Content scroll area */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .page-heading {
            margin-bottom: 18px;
        }
        .page-heading h2 {
            font-size: 20px;
            font-weight: 700;
            color: #343a40;
            margin: 0;
        }
        .page-heading p {
            font-size: 12px;
            color: #868e96;
            margin: 2px 0 0;
        }

        /* ══ CARDS ═══════════════════════════════════════ */
        .card {
            border: 1px solid rgba(0,0,0,.05);
            border-radius: 4px;
            box-shadow: var(--card-sh);
            background: #fff;
            margin-bottom: 0;
        }
        .card-header {
            background: #fff;
            border-bottom: 1px solid #f0f2f5;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .card-header-title {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #343a40;
        }
        .pill {
            font-size: 10px;
            font-weight: 700;
            padding: 2px 9px;
            border-radius: 20px;
            letter-spacing: .5px;
            text-transform: uppercase;
        }
        .pill-primary { background: rgba(84,92,216,.1);  color: var(--primary); }
        .pill-success { background: rgba(58,196,125,.1); color: var(--success); }
        .pill-info    { background: rgba(22,170,255,.1); color: var(--info); }
        .card-body { padding: 14px 16px; }

        /* ══ CONTROL ELEMENTS ════════════════════════════ */

        /* Quick step buttons */
        .step-btns { display: flex; gap: 6px; }
        .btn-step {
            flex: 1;
            padding: 7px 4px;
            font-size: 12px;
            font-weight: 600;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            background: #fff;
            color: #495057;
            cursor: pointer;
            text-align: center;
            transition: all .15s;
        }
        .btn-step:hover {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
        }
        .btn-step:active { transform: scale(.97); }

        /* sep */
        hr.ln { border: none; border-top: 1px solid #f0f2f5; margin: 2px 0; }

        /* ctrl row */
        .ctrl-row { display: flex; align-items: center; gap: 7px; }
        .btn-ctrl {
            padding: 6px 11px;
            font-size: 11px;
            font-weight: 700;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            background: #f8f9fa;
            color: #6c757d;
            cursor: pointer;
            white-space: nowrap;
            transition: all .15s;
        }
        .btn-ctrl:hover { background: #e9ecef; border-color: #adb5bd; color: var(--primary); }

        .dir-col { display: flex; flex-direction: column; gap: 3px; }
        .btn-dir {
            padding: 3px 11px;
            font-size: 10px;
            font-weight: 700;
            border: 1px solid #dee2e6;
            border-radius: 3px;
            background: #f8f9fa;
            color: #868e96;
            cursor: pointer;
            transition: all .15s;
        }
        .btn-dir:hover { background: #e9ecef; color: var(--primary); border-color: var(--primary); }

        /* monitor readout */
        .mon {
            background: #1e293b;
            color: #22d3ee;
            border: 1px solid #334155;
            border-radius: 4px;
            padding: 5px 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            font-weight: 700;
            width: 70px;
            text-align: right;
        }
        .mon:focus { outline: none; border-color: #38bdf8; }

        /* position buttons */
        .pos-row { display: grid; gap: 6px; }
        .g4 { grid-template-columns: repeat(4,1fr); }
        .g2 { grid-template-columns: repeat(2,1fr); }
        .btn-pos {
            padding: 8px 4px;
            font-size: 12px;
            font-weight: 600;
            border: none;
            border-radius: 4px;
            background: var(--primary);
            color: #fff;
            cursor: pointer;
            text-align: center;
            transition: filter .15s, transform .1s;
        }
        .btn-pos:hover  { filter: brightness(1.15); }
        .btn-pos:active { transform: scale(.97); }

        /* value inputs */
        .val-row { display: grid; gap: 6px; }
        input.val {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            color: #343a40;
            padding: 5px 7px;
            font-size: 13px;
            font-weight: 600;
            font-family: 'Courier New', monospace;
            text-align: right;
            width: 100%;
            transition: all .15s;
        }
        input.val:focus {
            outline: none;
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 2px rgba(84,92,216,.15);
        }

        /* Step 3/4 aligned grid */
        .s34 {
            display: grid;
            grid-template-columns: repeat(4,1fr) 48px;
            gap: 6px;
            align-items: center;
        }
        .s34 + .s34 { margin-top: 6px; }
        .s34-vt {
            display: grid;
            grid-template-columns: 1fr repeat(3,1fr) 48px;
            gap: 6px;
            align-items: center;
            margin-top: 6px;
        }
        .row-lbl {
            font-size: 10px;
            font-weight: 700;
            color: #adb5bd;
            text-align: center;
            text-transform: uppercase;
        }

        /* gap helpers */
        .mt8 { margin-top: 8px; }
        .d-flex-col { display: flex; flex-direction: column; gap: 10px; }
    </style>
</head>
<body>

<!-- ══ SIDEBAR ══════════════════════════════════════════════════════ -->
<div class="sidebar">

    <div class="sb-logo">
        <div class="sb-logo-title"><i class="fas fa-warehouse mr-2"></i>AS/RS HMI</div>
        <div class="sb-logo-sub">Control Panel v1.0</div>
    </div>

    <div class="sb-status">
        <div class="sb-section-lbl">System Status</div>
        <div class="sb-status-row">
            <div class="sb-led ready" id="sysLed"></div>
            <span class="sb-led-txt" id="sysStatus">READY</span>
        </div>
        <button class="btn-sb btn-sb-start" onclick="doStart()"><i class="fas fa-play mr-1"></i> START</button>
        <button class="btn-sb btn-sb-stop"  onclick="doStop()"><i class="fas fa-stop mr-1"></i> STOP</button>
    </div>

    <div class="sb-footer">
        <div class="sb-live">
            <div class="sb-live-dot"></div>
            <span class="sb-live-txt">LIVE</span>
        </div>
        <div class="sb-clock" id="clock">--:--:--</div>
    </div>

</div>

<!-- ══ MAIN AREA ════════════════════════════════════════════════════ -->
<div class="main-wrap">

    <!-- Topbar -->
    <div class="topbar">
        <div class="breadcrumb-wrap">
            <i class="fas fa-home" style="color:#ced4da"></i>
            <span class="sep">/</span>
            <span>HMI</span>
            <span class="sep">/</span>
            <span class="cur">Control Panel</span>
        </div>
        <div class="topbar-right">
            <button class="notif-btn">
                <i class="fas fa-bell"></i>
                <div class="notif-badge">3</div>
            </button>
            <div class="user-info">
                <div class="user-avatar">OP</div>
                <span>Operator</span>
            </div>
        </div>
    </div>

    <!-- Content -->
    <div class="content">

        <div class="page-heading">
            <h2>HMI Control Panel</h2>
            <p>AS/RS — Hệ thống lưu kho tự động tích hợp IoT &amp; RFID</p>
        </div>

        <div class="row no-gutters" style="gap:16px;flex-wrap:nowrap;align-items:start">

            <!-- LEFT: Step 1 + Step 2 -->
            <div class="d-flex-col" style="flex:1;min-width:0">

                <!-- Step 1 -->
                <div class="card">
                    <div class="card-header">
                        <span class="card-header-title">Step 1 — Hàng Ngang</span>
                        <span class="pill pill-primary">Stepper</span>
                    </div>
                    <div class="card-body d-flex-col">
                        <div class="step-btns">
                            <button class="btn-step">home</button>
                            <button class="btn-step">vitri2</button>
                            <button class="btn-step">vitri1</button>
                            <button class="btn-step">vitri3</button>
                        </div>
                        <hr class="ln">
                        <div class="ctrl-row">
                            <button class="btn-ctrl">set_home</button>
                            <div class="dir-col">
                                <button class="btn-dir">FW</button>
                                <button class="btn-dir">BW</button>
                            </div>
                            <input class="mon" value="0">
                        </div>
                        <div class="pos-row g4">
                            <button class="btn-pos">goc</button>
                            <button class="btn-pos">vt1</button>
                            <button class="btn-pos">vt2</button>
                            <button class="btn-pos">vt3</button>
                        </div>
                        <div class="val-row g4">
                            <input class="val" value="0">
                            <input class="val" value="158">
                            <input class="val" value="372">
                            <input class="val" value="600">
                        </div>
                    </div>
                </div>

                <!-- Step 2 -->
                <div class="card">
                    <div class="card-header">
                        <span class="card-header-title">Step 2 — Đẩy</span>
                        <span class="pill pill-success">Stepper</span>
                    </div>
                    <div class="card-body d-flex-col">
                        <div class="step-btns">
                            <button class="btn-step">home</button>
                            <button class="btn-step">vitriday</button>
                        </div>
                        <hr class="ln">
                        <div class="ctrl-row">
                            <button class="btn-ctrl">set_home</button>
                            <div class="dir-col">
                                <button class="btn-dir">FW</button>
                                <button class="btn-dir">BW</button>
                            </div>
                            <input class="mon" value="0">
                        </div>
                        <div class="pos-row g2">
                            <button class="btn-pos">goc</button>
                            <button class="btn-pos">vtday</button>
                        </div>
                        <div class="val-row g2">
                            <input class="val" value="0">
                            <input class="val" value="218">
                        </div>
                    </div>
                </div>

            </div>

            <!-- RIGHT: Step 3/4 -->
            <div style="flex:1.6;min-width:0">
                <div class="card">
                    <div class="card-header">
                        <span class="card-header-title">Step 3 / 4 — Hàng Dọc</span>
                        <span class="pill pill-info">Dual Stepper</span>
                    </div>
                    <div class="card-body d-flex-col">
                        <div class="step-btns">
                            <button class="btn-step">home</button>
                            <button class="btn-step">hang2</button>
                            <button class="btn-step">hang1</button>
                            <button class="btn-step">hang3</button>
                        </div>
                        <hr class="ln">
                        <div class="ctrl-row">
                            <button class="btn-ctrl">set_home</button>
                            <div class="dir-col">
                                <button class="btn-dir">FW</button>
                                <button class="btn-dir">BW</button>
                            </div>
                            <div class="d-flex flex-column" style="gap:4px">
                                <input class="mon" value="0">
                                <input class="mon" value="0">
                            </div>
                        </div>
                        <hr class="ln">
                        <div class="s34">
                            <button class="btn-pos">goc</button>
                            <button class="btn-pos">hang_1</button>
                            <button class="btn-pos">hang_2</button>
                            <button class="btn-pos">hang_3</button>
                            <div></div>
                        </div>
                        <div class="s34">
                            <input class="val" value="0">
                            <input class="val" value="640">
                            <input class="val" value="1738">
                            <input class="val" value="2758">
                            <span class="row-lbl">step3</span>
                        </div>
                        <div class="s34">
                            <input class="val" value="0">
                            <input class="val" value="640">
                            <input class="val" value="1738">
                            <input class="val" value="2758">
                            <span class="row-lbl">step4</span>
                        </div>
                        <div class="s34-vt">
                            <div></div>
                            <input class="val" value="640">
                            <input class="val" value="1738">
                            <input class="val" value="2758">
                            <span class="row-lbl">vitri</span>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
    setInterval(() => {
        document.getElementById('clock').textContent =
            new Date().toLocaleTimeString('vi-VN');
    }, 1000);

    const led    = document.getElementById('sysLed');
    const status = document.getElementById('sysStatus');

    function doStart() {
        led.className    = 'sb-led running';
        status.textContent = 'RUNNING';
    }
    function doStop() {
        led.className    = 'sb-led stopped';
        status.textContent = 'STOPPED';
    }
</script>
</body>
</html>
