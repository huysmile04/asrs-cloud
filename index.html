<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Smart AS/RS 9 Slots | bit.ly/asrs-cloud</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.0/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: white; text-align: center; margin: 0; padding: 20px; }
        .blink-glow { animation: glow-pulse 1s infinite alternate; border: 2px solid #f1c40f !important; box-shadow: 0 0 15px #f1c40f; }
        @keyframes glow-pulse { from { opacity: 1; } to { opacity: 0.5; } }
        .selected { border: 3px solid #f1c40f !important; transform: scale(1.05); z-index: 10; }
        #login-overlay { position: fixed; inset: 0; background: #1a1a2e; z-index: 100; display: flex; justify-content: center; align-items: center; }
        .login-box { background: #16213e; padding: 30px; border-radius: 10px; border: 1px solid #e94560; }
        .login-box input { display: block; width: 250px; padding: 12px; margin: 10px 0; border-radius: 5px; border: none; outline: none; }
        #main-content { display: none; max-width: 900px; margin: 0 auto; }
        
        /* Bảng trạng thái Hệ thống */
        .sys-status-bar { display: flex; justify-content: space-around; background: #0f3460; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-weight: bold; }
        .badge-ok { color: #2ecc71; }
        .badge-err { color: #e74c3c; }
        .badge-warn { color: #f1c40f; }

        .tabs { display: flex; justify-content: center; margin-bottom: 20px; border-bottom: 2px solid #0f3460; }
        .tab-btn { padding: 12px 25px; background: #16213e; border: none; color: #888; cursor: pointer; border-radius: 8px 8px 0 0; margin: 0 2px; font-weight: bold; }
        .tab-btn.active { background: #e94560; color: white; }
        .tab-content { display: none; background: #16213e; padding: 20px; border-radius: 0 0 10px 10px; border: 1px solid #0f3460; border-top: none; }
        .tab-content.active { display: block; }
        
        /* Lưới 9 ô (3x3) */
        .grid-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; max-width: 500px; margin: auto; }
        .slot { background: #27ae60; padding: 15px; border-radius: 8px; border: 1px solid #0f3460; transition: 0.3s; height: 70px; display: flex; flex-direction: column; justify-content: center; cursor: pointer; }
        .slot:hover { background: #2ecc71; }
        .slot.occupied { background: #e74c3c; }
        .slot.occupied:hover { background: #ff5e4d; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #0f3460; padding: 10px; }
        footer { margin-top: 30px; font-size: 13px; color: #555; border-top: 1px solid #0f3460; padding-top: 15px; }
    </style>
</head>

<body>
    <h1>🚀 AS/RS 9-SLOT CONTROL PANEL</h1>

    <div id="login-overlay">
        <div class="login-box">
            <h3>🔐 System Login</h3>
            <input type="text" id="user" placeholder="Username">
            <input type="password" id="pass" placeholder="Password">
            <button onclick="doLogin()" style="width:100%; padding:12px; background:#e94560; color:white; border:none; border-radius:5px; cursor:pointer; font-weight:bold">ACCESS DASHBOARD</button>
        </div>
    </div>

    <div id="main-content">
        <div class="sys-status-bar">
            <div>PLC S7-1200: <span id="st-plc" class="badge-err">DISCONNECTED</span></div>
            <div>STATUS: <span id="st-busy" class="badge-ok">READY</span></div>
            <div>TARGET SLOT: <span id="st-target" class="badge-warn">N/A</span></div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('tab-map')">WAREHOUSE MAP (9 SLOTS)</button>
            <button class="tab-btn" onclick="showTab('tab-logs')">OPERATION LOGS</button>
            <button class="tab-btn" onclick="showTab('tab-tools')">SYSTEM TOOLS</button>
        </div>

        <div id="tab-map" class="tab-content active">
            <p style="color: #888; font-size: 14px; margin-bottom: 15px;">💡 Click a slot -> (Scan RFID physically on Pi or Type UID) -> Click Action.</p>
            <div style="margin-bottom:20px; display:flex; gap:10px; justify-content:center">
                <input type="number" id="sID" placeholder="Slot" readonly style="width:80px; padding:10px; border-radius:5px; border:none; background: #0f3460; color: #f1c40f; font-weight: bold; text-align: center;">
                <input type="text" id="uID" placeholder="Scan or Type UID" style="padding:10px; border-radius:5px; border:none">
                <button onclick="sendCmd('IMPORT')" style="background:#e94560; color:white; padding:10px 20px; border:none; border-radius:5px; font-weight:bold; cursor:pointer;">📥 IMPORT</button>
                <button onclick="sendCmd('EXPORT')" style="background:#0f3460; color:white; padding:10px 20px; border:1px solid #e94560; border-radius:5px; font-weight:bold; cursor:pointer;">📤 EXPORT</button>
            </div>
            <div class="grid-container" id="grid"></div>
        </div>

        <div id="tab-logs" class="tab-content">
            <table id="hTable">
                <thead>
                    <tr><th>Time</th><th>Location</th><th>Action</th><th>UID</th></tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <div id="tab-tools" class="tab-content">
            <button onclick="adminAction('EXCEL')" style="background:#27ae60; color:white; padding:15px; border:none; border-radius:5px; margin:10px; font-weight:bold; cursor:pointer;">📊 EXPORT EXCEL REPORT</button>
            <button onclick="adminAction('RESET')" style="background:#e74c3c; color:white; padding:15px; border:none; border-radius:5px; margin:10px; font-weight:bold; cursor:pointer;">⚠️ EMERGENCY RESET PLC</button>
        </div>

        <footer>
            <p>Access Point: <b style="color: #e94560;">bit.ly/asrs-cloud</b></p>
            <p>© 2026 HCMUTE Graduation Project - Student: Huy</p>
        </footer>
    </div>

    <script>
        const CFG = { url: 'wss://5031841c1f8d4218bafa640220641d55.s1.eu.hivemq.cloud:8884/mqtt', opt: { username: 'lhuy04', password: 'Hcmute2026', protocol: 'wss', port: 8884 } };
        let client, lastMsg = "", interactingSlot = null;

        function doLogin() {
            if (document.getElementById('user').value === "admin" && document.getElementById('pass').value === "hcmute2026") {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                initGrid(); connect();
            } else alert("Mật khẩu không đúng!");
        }

        // Tạo 9 ô
        function initGrid() {
            const g = document.getElementById('grid'); g.innerHTML = "";
            for (let i = 1; i <= 9; i++) {
                g.innerHTML += `<div class="slot" id="s-${i}" onclick="selectSlot(${i})">
                    <b>Slot ${i}</b><br><span id="u-${i}">Available</span>
                </div>`;
            }
        }

        function selectSlot(id) {
            document.querySelectorAll('.slot').forEach(s => s.classList.remove('selected'));
            document.getElementById(`s-${id}`).classList.add('selected');
            document.getElementById('sID').value = id;
            document.getElementById('uID').value = ""; // Xóa UID cũ
        }

        function connect() {
            client = mqtt.connect(CFG.url, CFG.opt);
            client.on('connect', () => {
                client.subscribe(['warehouse/status', 'warehouse/history', 'warehouse/history_init', 'warehouse/sys_state']);
                client.publish('warehouse/command', JSON.stringify({ action: "GET_STATUS" }));
                client.publish('warehouse/command', JSON.stringify({ action: "GET_HISTORY" }));
            });
            client.on('message', (t, m) => {
                const s = m.toString(), d = JSON.parse(s);
                if (t === 'warehouse/status') updateUI(d);
                if (t === 'warehouse/history' && s !== lastMsg) { addRow(d, false); lastMsg = s; }
                if (t === 'warehouse/history_init') { document.querySelector("#hTable tbody").innerHTML = ""; d.forEach(l => addRow(l, true)); }
                if (t === 'warehouse/sys_state') updateSysState(d);
            });
        }

        // Cập nhật thanh giám sát PLC
        function updateSysState(data) {
            const stPlc = document.getElementById("st-plc");
            const stBusy = document.getElementById("st-busy");
            const stTarget = document.getElementById("st-target");

            stPlc.innerText = data.plc_connected ? "CONNECTED" : "DISCONNECTED";
            stPlc.className = data.plc_connected ? "badge-ok" : "badge-err";

            stBusy.innerText = data.is_busy ? "ROBOT RUNNING" : "READY";
            stBusy.className = data.is_busy ? "badge-err" : "badge-ok";

            stTarget.innerText = data.current_slot;
        }

        function sendCmd(act) {
            const sidInput = document.getElementById('sID');
            const uidInput = document.getElementById('uID');
            const sid = sidInput.value;

            if (!sid) return alert("Vui lòng click chọn 1 ô trên bản đồ!");

            // Nếu Import mà ko nhập UID, báo Pi dùng máy quét cứng
            if (act === 'IMPORT' && !uidInput.value) {
                alert("Bạn chọn chế độ quét thẻ vật lý. Vui lòng đặt thẻ vào cụm RFID trên Robot trong vòng vài giây tới!");
            }

            interactingSlot = sid;
            client.publish('warehouse/command', JSON.stringify({ action: act, slot_id: parseInt(sid), uid: uidInput.value || "N/A" }));

            sidInput.value = ""; uidInput.value = "";
            document.querySelectorAll('.slot').forEach(s => s.classList.remove('selected'));
        }

        function updateUI(data) {
            for (let i = 1; i <= 9; i++) {
                const s = data[`slot_${i}`];
                if(!s) continue;
                const div = document.getElementById(`s-${i}`), span = document.getElementById(`u-${i}`);
                if (s.status === "Occupied") { div.classList.add('occupied'); span.innerText = s.uid; }
                else { div.classList.remove('occupied'); span.innerText = "Available"; }

                if (interactingSlot == i) {
                    div.classList.add('blink-glow');
                    setTimeout(() => { div.classList.remove('blink-glow'); interactingSlot = null; }, 3000);
                }
            }
        }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function addRow(l, batch) {
            const row = `<tr><td>${l.time}</td><td>Slot ${l.slot}</td><td><b>${l.act}</b></td><td>${l.uid}</td></tr>`;
            document.querySelector("#hTable tbody").insertAdjacentHTML(batch ? 'beforeend' : 'afterbegin', row);
        }

        function adminAction(type) {
            if (prompt("Admin Password:") === "hcmute2026") {
                if (type === 'EXCEL') {
                    const wb = XLSX.utils.table_to_book(document.getElementById("hTable"));
                    XLSX.writeFile(wb, "Warehouse_Report.xlsx");
                } else if (type === 'RESET') {
                    // Chức năng khẩn cấp nhả bit Busy
                    client.publish('warehouse/command', JSON.stringify({ action: "EMERGENCY_RESET" }));
                    alert("Đã gửi lệnh Reset PLC!");
                }
            } else alert("Từ chối truy cập!");
        }
    </script>
</body>

</html>
