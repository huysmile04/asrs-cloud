<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AS/RS Control Center | bit.ly/asrs-cloud</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.0/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial; background: #1a1a2e; color: white; text-align: center; padding: 20px; }
        .status-bar { background: #16213e; padding: 10px; border-radius: 5px; margin: 15px auto; max-width: 1000px; border: 1px solid #0f3460; color: #2ecc71; font-weight: bold; }
        .control-panel { background: #16213e; padding: 20px; border-radius: 10px; max-width: 1000px; margin: 20px auto; display: flex; gap: 10px; justify-content: center; border: 1px solid #e94560; }
        .grid-container { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; max-width: 1000px; margin: 0 auto; }
        .slot { background: #27ae60; padding: 15px; border-radius: 8px; border: 1px solid #0f3460; }
        .slot.occupied { background: #e74c3c; }
        .history-section { max-width: 1000px; margin: 30px auto; background: #16213e; padding: 20px; border-radius: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #0f3460; padding: 10px; }
        th { background: #0f3460; color: #e94560; }
        input { padding: 10px; border-radius: 5px; border: none; background: #0f3460; color: white; }
        button { cursor: pointer; border: none; border-radius: 5px; padding: 10px 20px; font-weight: bold; color: white; transition: 0.3s; }
        footer { margin-top: 30px; padding: 20px; border-top: 1px solid #0f3460; font-size: 13px; color: #888; }
    </style>
</head>
<body>
    <h1>🚀 IOT-BASED AS/RS CONTROL CENTER</h1>
    <div class="status-bar" id="stat">🟢 SYSTEM ONLINE</div>

    <div class="control-panel">
        <input type="number" id="sID" placeholder="Slot (1-30)" style="width:80px">
        <input type="text" id="uID" placeholder="RFID Tag UID">
        <button onclick="send('IMPORT')" style="background:#e94560">IMPORT</button>
        <button onclick="send('EXPORT')" style="background:#0f3460; border:1px solid #e94560">EXPORT</button>
    </div>

    <div class="grid-container" id="grid"></div>

    <div class="history-section">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3>📜 OPERATION LOGS (SSD)</h3>
            <div>
                <button onclick="exportExcel()" style="background:#27ae60; margin-right:5px">EXCEL</button>
                <button onclick="resetHist()" style="background:#e74c3c">CLEAR SSD</button>
            </div>
        </div>
        <table id="hTable">
            <thead><tr><th>Time</th><th>Location</th><th>Action</th><th>UID</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>

    <footer>
        <p>Access Link: <b style="color: #e94560;">bit.ly/asrs-cloud</b></p>
        <p>© 2026 HCMUTE Graduation Project - Student: Huy</p>
    </footer>

    <script>
        const CFG = { url: 'wss://5031841c1f8d4218bafa640220641d55.s1.eu.hivemq.cloud:8884/mqtt', opt: { username: 'lhuy04', password: 'Hcmute2026', protocol: 'wss', port: 8884 } };
        let client, lastMsg = "";

        window.onload = () => {
            if(prompt("Password:") === "hcmute2026") { initGrid(); connect(); }
            else { location.reload(); }
        };

        function initGrid() {
            const g = document.getElementById('grid');
            for(let i=1; i<=30; i++) g.innerHTML += `<div class="slot" id="s-${i}"><b>Slot ${i}</b><br><span id="u-${i}">Available</span></div>`;
        }

        function connect() {
            client = mqtt.connect(CFG.url, CFG.opt);
            client.on('connect', () => {
                client.subscribe(['warehouse/status', 'warehouse/history', 'warehouse/history_init']);
                client.publish('warehouse/command', JSON.stringify({action: "GET_HISTORY"}));
            });
            client.on('message', (t, m) => {
                const s = m.toString();
                const d = JSON.parse(s);
                if(t === 'warehouse/status') updateUI(d);
                if(t === 'warehouse/history' && s !== lastMsg) { addRow(d, false); lastMsg = s; } // Chống Double
                if(t === 'warehouse/history_init') { document.querySelector("#hTable tbody").innerHTML = ""; d.forEach(l => addRow(l, true)); }
            });
        }

        function send(act) {
            const sid = document.getElementById('sID').value;
            const uid = document.getElementById('uID').value;
            if(!sid) return alert("Enter Slot ID!");
            client.publish('warehouse/command', JSON.stringify({action: act, slot_id: parseInt(sid), uid: uid || "N/A"}));
        }

        function updateUI(data) {
            for(let i=1; i<=30; i++) {
                const s = data[`slot_${i}`], div = document.getElementById(`s-${i}`), span = document.getElementById(`u-${i}`);
                if(s.status === "Occupied") { div.classList.add('occupied'); span.innerText = s.uid; }
                else { div.classList.remove('occupied'); span.innerText = "Available"; }
            }
        }

        function addRow(l, isBatch) {
            const row = `<tr><td>${l.time}</td><td>Slot ${l.slot}</td><td><b>${l.act}</b></td><td>${l.uid}</td></tr>`;
            const tb = document.querySelector("#hTable tbody");
            if(isBatch) tb.insertAdjacentHTML('beforeend', row);
            else tb.insertAdjacentHTML('afterbegin', row);
        }

        function exportExcel() {
            const wb = XLSX.utils.table_to_book(document.getElementById("hTable"));
            XLSX.writeFile(wb, "Warehouse_Report.xlsx");
        }

        function resetHist() {
            if(confirm("Clear SSD logs?")) client.publish('warehouse/command', JSON.stringify({action: "RESET_HISTORY"}));
        }
    </script>
</body>
</html>
