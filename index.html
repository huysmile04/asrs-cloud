<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart AS/RS | bit.ly/asrs-cloud</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.0/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: white; text-align: center; margin: 0; padding: 20px; }
        /* Hiệu ứng nhấp nháy */
        .blink { animation: blink-animation 0.5s steps(5, start) infinite; border: 3px solid white !important; }
        @keyframes blink-animation { to { visibility: hidden; } }

        #login-overlay { position: fixed; inset: 0; background: #1a1a2e; z-index: 100; display: flex; justify-content: center; align-items: center; }
        .login-box { background: #16213e; padding: 30px; border-radius: 10px; border: 1px solid #e94560; }
        .login-box input { display: block; width: 250px; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        
        #main-content { display: none; max-width: 1000px; margin: 0 auto; }
        .tabs { display: flex; justify-content: center; margin-bottom: 20px; }
        .tab-btn { padding: 10px 20px; background: #16213e; border: none; color: white; cursor: pointer; border-radius: 5px 5px 0 0; margin: 0 2px; }
        .tab-btn.active { background: #e94560; }
        .tab-content { display: none; background: #16213e; padding: 20px; border-radius: 10px; border: 1px solid #0f3460; }
        .tab-content.active { display: block; }

        .grid-container { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
        .slot { background: #27ae60; padding: 15px; border-radius: 5px; border: 1px solid #0f3460; transition: 0.3s; }
        .slot.occupied { background: #e74c3c; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #0f3460; padding: 10px; }
        footer { margin-top: 20px; font-size: 12px; color: #555; }
    </style>
</head>
<body>
    <h1>🚀 AS/RS CONTROL CENTER</h1>

    <div id="login-overlay">
        <div class="login-box">
            <h3>🔐 System Login</h3>
            <input type="text" id="user" placeholder="Username">
            <input type="password" id="pass" placeholder="Password">
            <button onclick="doLogin()" style="width:100%; padding:10px; background:#e94560; color:white; border:none; border-radius:5px; cursor:pointer">LOGIN</button>
        </div>
    </div>

    <div id="main-content">
        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('tab-map')">WAREHOUSE MAP</button>
            <button class="tab-btn" onclick="showTab('tab-logs')">OPERATION LOGS</button>
            <button class="tab-btn" onclick="showTab('tab-tools')">SYSTEM TOOLS</button>
        </div>

        <div id="tab-map" class="tab-content active">
            <div style="margin-bottom:20px; display:flex; gap:10px; justify-content:center">
                <input type="number" id="sID" placeholder="Slot ID" style="width:80px; padding:10px">
                <input type="text" id="uID" placeholder="RFID UID" style="padding:10px">
                <button onclick="sendCmd('IMPORT')" style="background:#e94560; color:white; padding:10px 20px; border:none; border-radius:5px">IMPORT</button>
                <button onclick="sendCmd('EXPORT')" style="background:#0f3460; color:white; padding:10px 20px; border:1px solid #e94560; border-radius:5px">EXPORT</button>
            </div>
            <div class="grid-container" id="grid"></div>
        </div>

        <div id="tab-logs" class="tab-content">
            <table id="hTable">
                <thead><tr><th>Time</th><th>Location</th><th>Action</th><th>UID</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>

        <div id="tab-tools" class="tab-content">
            <button onclick="adminAction('EXCEL')" style="background:#27ae60; color:white; padding:15px; border:none; border-radius:5px; margin:10px">📊 EXPORT EXCEL</button>
            <button onclick="adminAction('RESET')" style="background:#e74c3c; color:white; padding:15px; border:none; border-radius:5px; margin:10px">🗑️ CLEAR SSD</button>
        </div>

        <footer>
            <p>Access: bit.ly/asrs-cloud | © 2026 HCMUTE - Huy</p>
        </footer>
    </div>

    <script>
        const CFG = { url: 'wss://5031841c1f8d4218bafa640220641d55.s1.eu.hivemq.cloud:8884/mqtt', opt: { username: 'lhuy04', password: 'Hcmute2026', protocol: 'wss', port: 8884 } };
        let client, lastMsg = "", targetedSlot = null;

        function doLogin() {
            if(document.getElementById('user').value === "admin" && document.getElementById('pass').value === "hcmute2026") {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                initGrid(); connect();
            } else alert("Wrong credentials!");
        }

        function initGrid() {
            const g = document.getElementById('grid'); g.innerHTML = "";
            for(let i=1; i<=30; i++) g.innerHTML += `<div class="slot" id="s-${i}"><b>Slot ${i}</b><br><span id="u-${i}">Available</span></div>`;
        }

        function connect() {
            client = mqtt.connect(CFG.url, CFG.opt);
            client.on('connect', () => {
                client.subscribe(['warehouse/status', 'warehouse/history', 'warehouse/history_init']);
                // Đồng bộ ngay khi login
                client.publish('warehouse/command', JSON.stringify({action: "GET_STATUS"}));
                client.publish('warehouse/command', JSON.stringify({action: "GET_HISTORY"}));
            });
            client.on('message', (t, m) => {
                const s = m.toString(), d = JSON.parse(s);
                if(t === 'warehouse/status') updateUI(d);
                if(t === 'warehouse/history' && s !== lastMsg) { addRow(d, false); lastMsg = s; }
                if(t === 'warehouse/history_init') { document.querySelector("#hTable tbody").innerHTML = ""; d.forEach(l => addRow(l, true)); }
            });
        }

        function sendCmd(act) {
            const sid = document.getElementById('sID').value;
            const uid = document.getElementById('uID').value;
            if(!sid) return alert("Enter Slot ID!");
            targetedSlot = sid; // Lưu lại để nhấp nháy
            client.publish('warehouse/command', JSON.stringify({action: act, slot_id: parseInt(sid), uid: uid || "N/A"}));
            // Xóa trống ô nhập
            document.getElementById('sID').value = ""; document.getElementById('uID').value = "";
        }

        function updateUI(data) {
            for(let i=1; i<=30; i++) {
                const s = data[`slot_${i}`], div = document.getElementById(`s-${i}`), span = document.getElementById(`u-${i}`);
                if(s && s.status === "Occupied") { div.classList.add('occupied'); span.innerText = s.uid; }
                else { div.classList.remove('occupied'); span.innerText = "Available"; }
                
                // Hiệu ứng nhấp nháy 3s
                if(targetedSlot == i) {
                    div.classList.add('blink');
                    setTimeout(() => { div.classList.remove('blink'); targetedSlot = null; }, 3000);
                }
            }
        }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function addRow(l, batch) {
            const row = `<tr><td>${l.time}</td><td>Slot ${l.slot}</td><td><b>${l.act}</b></td><td>${l.uid}</td></tr>`;
            document.querySelector("#hTable tbody").insertAdjacentHTML(batch ? 'beforeend' : 'afterbegin', row);
        }

        function adminAction(type) {
            if(prompt("Admin Password:") === "hcmute2026") {
                if(type === 'EXCEL') {
                    const wb = XLSX.utils.table_to_book(document.getElementById("hTable"));
                    XLSX.writeFile(wb, "Warehouse_Report.xlsx");
                } else client.publish('warehouse/command', JSON.stringify({action: "RESET_HISTORY"}));
            } else alert("Denied!");
        }
    </script>
</body>
</html>
