<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SMART AS/RS | DASHBOARD</title>
    <script src="https://cdn.jsdelivr.net/npm/mqtt@5.1.1/dist/mqtt.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.0/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: white; text-align: center; margin: 0; padding: 20px; }
        .blink-glow { animation: glow-pulse 1s infinite alternate; border: 2px solid #f1c40f !important; box-shadow: 0 0 15px #f1c40f; }
        @keyframes glow-pulse { from { opacity: 1; } to { opacity: 0.5; } }
        .selected { border: 3px solid #3498db !important; transform: scale(1.05); z-index: 10; box-shadow: 0 0 15px #3498db; }
        
        #login-overlay { position: fixed; inset: 0; background: #1a1a2e; z-index: 100; display: flex; justify-content: center; align-items: center; }
        .login-box { background: #16213e; padding: 30px; border-radius: 10px; border: 1px solid #e94560; }
        .login-box input { display: block; width: 250px; padding: 12px; margin: 10px 0; border-radius: 5px; border: none; outline: none; }
        
        #main-content { display: none; max-width: 1000px; margin: 0 auto; }
        .tabs { display: flex; justify-content: center; margin-bottom: 20px; border-bottom: 2px solid #0f3460; }
        .tab-btn { padding: 12px 25px; background: #16213e; border: none; color: #888; cursor: pointer; border-radius: 8px 8px 0 0; margin: 0 2px; font-weight: bold; }
        .tab-btn.active { background: #e94560; color: white; }
        .tab-content { display: none; background: #16213e; padding: 20px; border-radius: 0 0 10px 10px; border: 1px solid #0f3460; border-top: none; }
        .tab-content.active { display: block; }

        .grid-container { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
        .slot { background: #27ae60; padding: 10px; border-radius: 5px; border: 1px solid #0f3460; transition: 0.3s; height: 80px; display: flex; flex-direction: column; justify-content: center; cursor: pointer; overflow: hidden; }
        .slot:hover { background: #2ecc71; }
        .slot.occupied { background: #e74c3c; }
        .item-name { font-size: 11px; font-weight: bold; color: #f1c40f; margin-top: 5px; white-space: nowrap; text-overflow: ellipsis; overflow: hidden; }

        #robot-status { background: #0f3460; padding: 15px; border-radius: 8px; margin-bottom: 15px; font-weight: bold; color: #3498db; border: 1px solid #3498db; }

        .swal-form-label { text-align: left; display: block; font-weight: bold; margin-top: 10px; font-size: 14px; color: #3498db; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: #16213e; }
        th, td { border: 1px solid #0f3460; padding: 10px; }
        footer { margin-top: 30px; font-size: 13px; color: #555; border-top: 1px solid #0f3460; padding-top: 15px; }
    </style>
</head>
<body onclick="deselectAll()">
    <h1>🚀 IOT-BASED AS/RS SYSTEM</h1>

    <div id="login-overlay">
        <div class="login-box">
            <h3>🔐 SYSTEM LOGIN</h3>
            <input type="text" id="user" placeholder="Username">
            <input type="password" id="pass" placeholder="Password">
            <button onclick="doLogin()" style="width:100%; padding:12px; background:#e94560; color:white; border:none; border-radius:5px; cursor:pointer; font-weight:bold">ACCESS DASHBOARD</button>
        </div>
    </div>

    <div id="main-content" onclick="event.stopPropagation()">
        <div id="robot-status">ROBOT STATUS: CONNECTING...</div>

        <div class="tabs">
            <button class="tab-btn active" onclick="showTab(event, 'tab-map')">WAREHOUSE MAP</button>
            <button class="tab-btn" onclick="showTab(event, 'tab-logs')">OPERATION LOGS</button>
            <button class="tab-btn" onclick="showTab(event, 'tab-tools')">SYSTEM TOOLS</button>
        </div>

        <div id="tab-map" class="tab-content active">
            <div style="margin-bottom:20px; display:flex; gap:10px; justify-content:center">
                <button onclick="openImportModal()" style="background:#e94560; color:white; padding:12px 25px; border:none; border-radius:8px; font-weight:bold; cursor:pointer">IMPORT ITEM</button>
                <button onclick="lookupItem()" style="background:#f1c40f; color: #1a1a2e; padding:12px 25px; border:none; border-radius:8px; font-weight:bold; cursor:pointer">LOOKUP INFO</button>
                <button onclick="sendExport()" style="background:#0f3460; color:white; padding:12px 25px; border:1px solid #e94560; border-radius:8px; font-weight:bold; cursor:pointer">EXPORT SELECTED</button>
            </div>
            <div class="grid-container" id="grid"></div>
        </div>

        <div id="tab-logs" class="tab-content">
            <table id="hTable">
                <thead><tr><th>Time</th><th>Location</th><th>Action</th><th>Item Name</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>

        <div id="tab-tools" class="tab-content">
            <button onclick="adminAction('EXCEL')" style="background:#27ae60; color:white; padding:15px; border:none; border-radius:5px; margin:10px; font-weight:bold">📊 EXPORT REPORT</button>
        </div>

        <footer>
            <p>Access Point: <b style="color: #e94560;">bit.ly/asrs-cloud</b></p>
            <p>© 2026 HCMUTE Graduation Project - Student: Huy</p>
        </footer>
    </div>

    <script>
        // --- CAU HINH MQTT ---
        const CFG = { 
            url: 'wss://5031841c1f8d4218bafa640220641d55.s1.eu.hivemq.cloud:8884/mqtt', 
            opt: { 
                username: 'lhuy04', 
                password: 'Hcmute2026', 
                clientId: 'Web_Huy_' + Math.random().toString(16).substr(2, 8),
                clean: true,
                connectTimeout: 4000
            } 
        };

        let client, selectedSlot = null, currentData = {};

        // GOI KET NOI NGAY KHI MO TRANG
        connectMQTT();

        function doLogin() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(u === "admin" && p === "hcmute2026") {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                initGrid();
            } else {
                Swal.fire('Error', 'Sai tai khoan hoac mat khau!', 'error');
            }
        }

        function initGrid() {
            const g = document.getElementById('grid'); g.innerHTML = "";
            for(let i=1; i<=30; i++) {
                g.innerHTML += `<div class="slot" id="s-${i}" onclick="selectSlot(event, ${i})">
                    <b>Slot ${i}</b><br><span id="name-${i}" class="item-name">Available</span>
                </div>`;
            }
        }

        function connectMQTT() {
            client = mqtt.connect(CFG.url, CFG.opt);
            
            client.on('connect', () => {
                document.getElementById('robot-status').innerText = "ROBOT STATUS: ONLINE";
                client.subscribe(['warehouse/status', 'warehouse/history', 'warehouse/robot_state', 'warehouse/ack', 'warehouse/error']);
                client.publish('warehouse/command', JSON.stringify({action: "GET_STATUS"}));
            });

            client.on('message', (topic, message) => {
                const msg = message.toString();
                let data; 
                try { data = JSON.parse(msg); } catch(e) { data = msg; }

                if(topic === 'warehouse/status') { currentData = data; updateUI(data); }
                if(topic === 'warehouse/robot_state') document.getElementById('robot-status').innerText = "ROBOT: " + data;
                if(topic === 'warehouse/ack') Swal.fire('Success', data, 'success');
                if(topic === 'warehouse/error') Swal.fire('System Error', data, 'error');
                if(topic === 'warehouse/history') addRow(data);
            });
        }

        async function openImportModal() {
            const { value: formValues } = await Swal.fire({
                title: '📦 NHAP HANG VAO KHO',
                width: '600px',
                background: '#16213e', color: '#fff',
                html: `
                    <div style="text-align:left">
                        <label class="swal-form-label">Ten mon hang:</label>
                        <input id="swal-name" class="swal2-input" placeholder="Vi du: Motor buoc...">
                        <label class="swal-form-label">Ghi chu:</label>
                        <input id="swal-note" class="swal2-input" placeholder="Ghi chu them...">
                    </div>`,
                focusConfirm: false,
                showCancelButton: true,
                preConfirm: () => {
                    const name = document.getElementById('swal-name').value;
                    if (!name) { Swal.showValidationMessage('Vui long nhap ten hang!'); return false; }
                    return { name: name, note: document.getElementById('swal-note').value };
                }
            });

            if (formValues) {
                // GUI KHOI DATA KHOP VOI BACKEND PYTHON
                client.publish('warehouse/command', JSON.stringify({
                    action: "IMPORT",
                    item_details: { 
                        name: formValues.name, 
                        note: formValues.note 
                    }
                }));
            }
        }

        function selectSlot(event, id) {
            event.stopPropagation();
            document.querySelectorAll('.slot').forEach(s => s.classList.remove('selected'));
            document.getElementById(`s-${id}`).classList.add('selected');
            selectedSlot = id;
        }

        function deselectAll() {
            document.querySelectorAll('.slot').forEach(s => s.classList.remove('selected'));
            selectedSlot = null;
        }

        function sendExport() {
            if(!selectedSlot) return Swal.fire('Warning', 'Vui long chon o tren ban do!', 'warning');
            client.publish('warehouse/command', JSON.stringify({
                action: "EXPORT", 
                slot_id: selectedSlot 
            }));
            deselectAll();
        }

        function lookupItem() {
            if(!selectedSlot) return Swal.fire('Warning', 'Chua chon o tra cuu!', 'warning');
            const item = currentData[`slot_${selectedSlot}`];
            if(!item || item.status !== "Occupied") return Swal.fire('Info', 'O nay dang trong', 'info');

            Swal.fire({
                title: `INFO SLOT ${selectedSlot}`,
                background: '#16213e', color: '#fff',
                html: `<div style="text-align:left">
                    <b>Product:</b> ${item.item_name}<br>
                    <b>RFID UID:</b> ${item.uid}<br>
                    <b>Time:</b> ${item.time}
                </div>`
            });
        }

        function updateUI(data) {
            for(let i=1; i<=30; i++) {
                const s = data[`slot_${i}`], div = document.getElementById(`s-${i}`), nameSpan = document.getElementById(`name-${i}`);
                if(s && s.status === "Occupied") { 
                    div.classList.add('occupied'); 
                    nameSpan.innerText = s.item_name; 
                } else { 
                    div.classList.remove('occupied'); 
                    nameSpan.innerText = "Available"; 
                }
            }
        }

        function showTab(event, id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function addRow(l) {
            const row = `<tr><td>${l.time}</td><td>Slot ${l.slot}</td><td><b>${l.act}</b></td><td>${l.item || '---'}</td></tr>`;
            document.querySelector("#hTable tbody").insertAdjacentHTML('afterbegin', row);
        }

        function adminAction(type) {
            if(type === 'EXCEL') {
                const wb = XLSX.utils.table_to_book(document.getElementById("hTable"));
                XLSX.writeFile(wb, "ASRS_Report.xlsx");
            }
        }
    </script>
</body>
</html>
