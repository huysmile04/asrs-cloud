<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AS/RS Management System | HCMUTE</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.0/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial; background: #1a1a2e; color: white; text-align: center; padding: 20px; margin: 0; }
        h1 { color: #e94560; margin-bottom: 20px; }
        
        /* --- LOGIN MODAL --- */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a2e; z-index: 999; display: flex; justify-content: center; align-items: center; }
        .login-box { background: #16213e; padding: 40px; border-radius: 15px; border: 1px solid #e94560; width: 300px; box-shadow: 0 0 20px rgba(233, 69, 96, 0.3); }
        .login-box input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 5px; border: none; background: #0f3460; color: white; }
        
        /* --- MAIN CONTENT (HIDDEN BY DEFAULT) --- */
        #main-content { display: none; max-width: 1000px; margin: 0 auto; }
        
        /* --- TAB SYSTEM --- */
        .tabs { display: flex; justify-content: center; gap: 5px; margin-bottom: 20px; border-bottom: 2px solid #0f3460; }
        .tab-btn { background: #16213e; padding: 12px 25px; border: none; color: #888; cursor: pointer; border-radius: 10px 10px 0 0; font-weight: bold; transition: 0.3s; }
        .tab-btn.active { background: #e94560; color: white; }
        .tab-content { display: none; padding: 20px; background: #16213e; border-radius: 0 0 10px 10px; border: 1px solid #0f3460; border-top: none; }
        .tab-content.active { display: block; }

        /* --- STYLES REUSE --- */
        .status-bar { background: #16213e; padding: 10px; border-radius: 5px; margin: 15px 0; border: 1px solid #0f3460; color: #2ecc71; font-weight: bold; }
        .control-panel { background: #0f3460; padding: 20px; border-radius: 10px; display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
        .grid-container { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
        .slot { background: #27ae60; padding: 15px; border-radius: 8px; border: 1px solid #0f3460; }
        .slot.occupied { background: #e74c3c; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #0f3460; padding: 10px; text-align: center; }
        th { background: #0f3460; color: #e94560; }
        button { cursor: pointer; border: none; border-radius: 5px; padding: 10px 20px; font-weight: bold; color: white; transition: 0.2s; }
        footer { margin-top: 30px; font-size: 13px; color: #888; }
    </style>
</head>
<body>

    <h1>🚀 AS/RS CLOUD-BASED SYSTEM</h1>

    <div id="login-overlay">
        <div class="login-box">
            <h3>System Login</h3>
            <input type="text" id="user" placeholder="Username">
            <input type="password" id="pass" placeholder="Password">
            <button onclick="checkLogin()" style="background:#e94560; width:100%">UNLOCK SYSTEM</button>
            <p style="font-size: 11px; margin-top: 15px; color: #555;">HCMUTE Thesis - 2026</p>
        </div>
    </div>

    <div id="main-content">
        <div class="status-bar" id="stat">🟢 CONNECTION: SECURED</div>

        <div class="tabs">
            <button class="tab-btn active" onclick="openTab(event, 'map')">WAREHOUSE MAP</button>
            <button class="tab-btn" onclick="openTab(event, 'logs')">OPERATION LOGS</button>
            <button class="tab-btn" onclick="openTab(event, 'tools')">SYSTEM TOOLS</button>
        </div>

        <div id="map" class="tab-content active">
            <div class="control-panel">
                <input type="number" id="sID" placeholder="Slot ID" style="width:80px">
                <input type="text" id="uID" placeholder="RFID Tag">
                <button onclick="send('IMPORT')" style="background:#e94560">IMPORT</button>
                <button onclick="send('EXPORT')" style="background:#0f3460; border:1px solid #e94560">EXPORT</button>
            </div>
            <div class="grid-container" id="grid"></div>
        </div>

        <div id="logs" class="tab-content">
            <table id="hTable">
                <thead><tr><th>Time</th><th>Location</th><th>Action</th><th>UID</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>

        <div id="tools" class="tab-content">
            <div style="display: flex; flex-direction: column; gap: 15px; align-items: center; padding: 30px;">
                <p>⚠️ Administrative Actions (Password Required)</p>
                <button onclick="secureAction('EXCEL')" style="background:#27ae60; width: 250px">📊 EXPORT EXCEL REPORT</button>
                <button onclick="secureAction('RESET')" style="background:#e74c3c; width: 250px">🗑️ CLEAR SSD HISTORY</button>
            </div>
        </div>

        <footer>
            <p>Access Point: <b style="color: #e94560;">bit.ly/asrs-cloud</b></p>
            <p>© 2026 HCMUTE Graduation Project - Huy</p>
        </footer>
    </div>

    <script>
        const CFG = { url: 'wss://5031841c1f8d4218bafa640220641d55.s1.eu.hivemq.cloud:8884/mqtt', opt: { username: 'lhuy04', password: 'Hcmute2026', protocol: 'wss', port: 8884 } };
        const ADMIN_USER = "admin";
        const ADMIN_PASS = "hcmute2026";
        let client, lastMsg = "";

        // LOGIN LOGIC
        function checkLogin() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(u === ADMIN_USER && p === ADMIN_PASS) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                initGrid();
                connect();
            } else {
                alert("Invalid Credentials!");
            }
        }

        // TAB LOGIC
        function openTab(evt, tabName) {
            let i, content, tabs;
            content = document.getElementsByClassName("tab-content");
            for (i = 0; i < content.length; i++) content[i].classList.remove("active");
            tabs = document.getElementsByClassName("tab-btn");
            for (i = 0; i < tabs.length; i++) tabs[i].classList.remove("active");
            document.getElementById(tabName).classList.add("active");
            evt.currentTarget.classList.add("active");
        }

        // SECURE ACTIONS
        function secureAction(type) {
            const check = prompt("Confirm Admin Password to continue:");
            if(check === ADMIN_PASS) {
                if(type === 'EXCEL') {
                    const wb = XLSX.utils.table_to_book(document.getElementById("hTable"));
                    XLSX.writeFile(wb, "Warehouse_Report_2026.xlsx");
                } else if(type === 'RESET') {
                    client.publish('warehouse/command', JSON.stringify({action: "RESET_HISTORY"}));
                }
            } else {
                alert("Unauthorized!");
            }
        }

        // MQTT & GRID LOGIC (REUSED & FIXED)
        function initGrid() {
            const g = document.getElementById('grid');
            for(let i=1; i<=30; i++) g.innerHTML += `<div class="slot" id="s-${i}"><b>Slot ${i}</b><br><span id="u-${i}">Available</span></div>`;
        }

        function connect() {
            client = mqtt.connect(CFG.url, CFG.opt);
            client.on('connect', () => {
                client.subscribe(['warehouse/status', 'warehouse/history', 'warehouse/history_init']);
                client.publish('warehouse/command', JSON.stringify({action: "GET_HISTORY"}));
            });
            client.on('message', (t, m) => {
                const s = m.toString();
                const d = JSON.parse(s);
                if(t === 'warehouse/status') updateUI(d);
                if(t === 'warehouse/history' && s !== lastMsg) { addRow(d, false); lastMsg = s; }
                if(t === 'warehouse/history_init') { document.querySelector("#hTable tbody").innerHTML = ""; d.forEach(l => addRow(l, true)); }
            });
        }

        function send(act) {
            const sid = document.getElementById('sID').value;
            const uid = document.getElementById('uID').value;
            if(!sid) return alert("Enter Slot ID!");
            client.publish('warehouse/command', JSON.stringify({action: act, slot_id: parseInt(sid), uid: uid || "N/A"}));
            sidInput.value = "";
            uidInput.value = "";
        }

        function updateUI(data) {
            for(let i=1; i<=30; i++) {
                const s = data[`slot_${i}`], div = document.getElementById(`s-${i}`), span = document.getElementById(`u-${i}`);
                if(s.status === "Occupied") { div.classList.add('occupied'); span.innerText = s.uid; }
                else { div.classList.remove('occupied'); span.innerText = "Available"; }
            }
        }

        function addRow(l, isBatch) {
            const row = `<tr><td>${l.time}</td><td>Slot ${l.slot}</td><td><b>${l.act}</b></td><td>${l.uid}</td></tr>`;
            const tb = document.querySelector("#hTable tbody");
            if(isBatch) tb.insertAdjacentHTML('beforeend', row);
            else tb.insertAdjacentHTML('afterbegin', row);
        }
    </script>
</body>
</html>
