<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AS/RS Pro | bit.ly/asrs-cloud</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; margin: 0; padding: 20px; }
        .grid-container { display: grid; grid-template-columns: repeat(6, 1fr); gap: 15px; margin-top: 20px; }
        .slot { 
            background: #1e293b; padding: 20px; border-radius: 12px; border: 2px solid #334155; 
            transition: 0.3s; cursor: pointer; text-align: center;
        }
        .slot.occupied { background: #ef4444; border-color: #991b1b; }
        .slot.selected { border-color: #3b82f6; box-shadow: 0 0 15px #3b82f6; transform: scale(1.05); }
        .item-name { font-weight: bold; font-size: 14px; margin-top: 5px; display: block; color: #f1c40f; }
        .controls { background: #1e293b; padding: 20px; border-radius: 15px; display: flex; gap: 20px; justify-content: center; }
        button { padding: 12px 25px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .btn-import { background: #10b981; color: white; }
        .btn-export { background: #3b82f6; color: white; }
        .btn-lookup { background: #f59e0b; color: white; }
    </style>
</head>
<body onclick="handleDeselect(event)">
    <h2 style="text-align:center; color:#3b82f6">🚀 SMART WAREHOUSE AI</h2>

    <div class="controls" onclick="event.stopPropagation()">
        <button class="btn-import" onclick="openImportForm()">IMPORT NEW ITEM</button>
        <button class="btn-lookup" onclick="lookupItem()">LOOKUP INFO</button>
        <button class="btn-export" onclick="confirmExport()">EXPORT ITEM</button>
    </div>

    <div class="grid-container" id="grid"></div>

    <script>
        const CFG = { url: 'wss://5031841c1f8d4218bafa640220641d55.s1.eu.hivemq.cloud:8884/mqtt', opt: { username: 'lhuy04', password: 'Hcmute2026', protocol: 'wss', port: 8884 } };
        let client, selectedSlot = null, warehouseData = {};

        function init() {
            const g = document.getElementById('grid'); g.innerHTML = "";
            for(let i=1; i<=30; i++) {
                g.innerHTML += `<div class="slot" id="s-${i}" onclick="selectSlot(event, ${i})">
                    <small>Slot ${i}</small>
                    <span id="name-${i}" class="item-name">Empty</span>
                </div>`;
            }
            connect();
        }

        function selectSlot(e, id) {
            e.stopPropagation();
            document.querySelectorAll('.slot').forEach(s => s.classList.remove('selected'));
            document.getElementById(`s-${id}`).classList.add('selected');
            selectedSlot = id;
        }

        function handleDeselect(e) {
            document.querySelectorAll('.slot').forEach(s => s.classList.remove('selected'));
            selectedSlot = null;
        }

        function openImportForm() {
            Swal.fire({
                title: 'Import Item',
                input: 'text',
                inputLabel: 'Enter Item Name',
                showCancelButton: true,
                background: '#1e293b', color: '#fff'
            }).then((result) => {
                if (result.isConfirmed && result.value) {
                    client.publish('warehouse/command', JSON.stringify({action: "IMPORT", item_name: result.value}));
                    Swal.fire('Processing', 'Robot is moving to the nearest slot...', 'info');
                }
            });
        }

        function lookupItem() {
            if(!selectedSlot) return Swal.fire('Error', 'Please select a slot first!', 'warning');
            const item = warehouseData[`slot_${selectedSlot}`];
            if(!item || item.status !== "Occupied") return Swal.fire('Empty', 'This slot has no item.', 'info');
            
            Swal.fire({
                title: 'Item Information',
                html: `<div style="text-align:left"><b>Name:</b> ${item.item_name}<br><b>UID:</b> ${item.uid}<br><b>Time:</b> ${item.time}</div>`,
                background: '#1e293b', color: '#fff'
            });
        }

        function connect() {
            client = mqtt.connect(CFG.url, CFG.opt);
            client.on('connect', () => {
                client.subscribe('warehouse/status');
                client.publish('warehouse/command', JSON.stringify({action: "GET_STATUS"}));
            });
            client.on('message', (t, m) => {
                warehouseData = JSON.parse(m.toString());
                updateGrid();
            });
        }

        function updateGrid() {
            for(let i=1; i<=30; i++) {
                const s = warehouseData[`slot_${i}`], div = document.getElementById(`s-${i}`), nameEl = document.getElementById(`name-${i}`);
                if(s && s.status === "Occupied") {
                    div.classList.add('occupied');
                    nameEl.innerText = s.item_name; // Hiển thị tên món hàng thay vì UID
                } else {
                    div.classList.remove('occupied');
                    nameEl.innerText = "Empty";
                }
            }
        }

        function confirmExport() {
            if(!selectedSlot) return Swal.fire('Error', 'Select a slot to export!', 'warning');
            client.publish('warehouse/command', JSON.stringify({action: "EXPORT", slot_id: selectedSlot}));
            selectedSlot = null;
        }

        window.onload = init;
    </script>
</body>
</html>
