<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart AS/RS | bit.ly/asrs-cloud</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.0/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: white; text-align: center; margin: 0; padding: 20px; }
        
        /* Hiệu ứng nháy sáng và chọn ô */
        .blink-glow { animation: glow-pulse 1s infinite alternate; border: 2px solid #f1c40f !important; box-shadow: 0 0 15px #f1c40f; }
        @keyframes glow-pulse { from { opacity: 1; } to { opacity: 0.5; } }
        .selected { border: 3px solid #3498db !important; transform: scale(1.05); z-index: 10; box-shadow: 0 0 15px #3498db; }
        
        #login-overlay { position: fixed; inset: 0; background: #1a1a2e; z-index: 100; display: flex; justify-content: center; align-items: center; }
        .login-box { background: #16213e; padding: 30px; border-radius: 10px; border: 1px solid #e94560; }
        .login-box input { display: block; width: 250px; padding: 12px; margin: 10px 0; border-radius: 5px; border: none; outline: none; }
        
        #main-content { display: none; max-width: 1000px; margin: 0 auto; }
        .tabs { display: flex; justify-content: center; margin-bottom: 20px; border-bottom: 2px solid #0f3460; }
        .tab-btn { padding: 12px 25px; background: #16213e; border: none; color: #888; cursor: pointer; border-radius: 8px 8px 0 0; margin: 0 2px; font-weight: bold; }
        .tab-btn.active { background: #e94560; color: white; }
        .tab-content { display: none; background: #16213e; padding: 20px; border-radius: 0 0 10px 10px; border: 1px solid #0f3460; border-top: none; }
        .tab-content.active { display: block; }

        .grid-container { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
        .slot { background: #27ae60; padding: 10px; border-radius: 5px; border: 1px solid #0f3460; transition: 0.3s; height: 80px; display: flex; flex-direction: column; justify-content: center; cursor: pointer; overflow: hidden; }
        .slot:hover { background: #2ecc71; }
        .slot.occupied { background: #e74c3c; }
        .item-name { font-size: 11px; font-weight: bold; color: #f1c40f; margin-top: 5px; white-space: nowrap; text-overflow: ellipsis; overflow: hidden; }

        #robot-status { background: #0f3460; padding: 10px; border-radius: 5px; margin-bottom: 15px; font-weight: bold; color: #3498db; display: none; }

        /* Custom style cho form nhập liệu chi tiết */
        .swal-form-label { text-align: left; display: block; font-weight: bold; margin-top: 10px; font-size: 14px; color: #3498db; }
        .swal-form-input { width: 100%; box-sizing: border-box; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #0f3460; padding: 10px; }
        footer { margin-top: 30px; font-size: 13px; color: #555; border-top: 1px solid #0f3460; padding-top: 15px; }
    </style>
</head>
<body onclick="deselectAll()">
    <h1>🚀 IOT-BASED AS/RS SYSTEM</h1>

    <div id="login-overlay">
        <div class="login-box">
            <h3>🔐 System Login</h3>
            <input type="text" id="user" placeholder="Username">
            <input type="password" id="pass" placeholder="Password">
            <button onclick="doLogin()" style="width:100%; padding:12px; background:#e94560; color:white; border:none; border-radius:5px; cursor:pointer; font-weight:bold">ACCESS DASHBOARD</button>
        </div>
    </div>

    <div id="main-content" onclick="event.stopPropagation()">
        <div id="robot-status">🤖 ROBOT: IDLE</div>

        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('tab-map')">WAREHOUSE MAP</button>
            <button class="tab-btn" onclick="showTab('tab-logs')">OPERATION LOGS</button>
            <button class="tab-btn" onclick="showTab('tab-tools')">SYSTEM TOOLS</button>
        </div>

        <div id="tab-map" class="tab-content active">
            <div style="margin-bottom:20px; display:flex; gap:10px; justify-content:center">
                <button onclick="openImportModal()" style="background:#e94560; color:white; padding:12px 25px; border:none; border-radius:8px; font-weight:bold; cursor:pointer">IMPORT ITEM</button>
                <button onclick="lookupItem()" style="background:#f1c40f; color: #1a1a2e; padding:12px 25px; border:none; border-radius:8px; font-weight:bold; cursor:pointer">LOOKUP INFO</button>
                <button onclick="sendExport()" style="background:#0f3460; color:white; padding:12px 25px; border:1px solid #e94560; border-radius:8px; font-weight:bold; cursor:pointer">EXPORT SELECTED</button>
            </div>
            <div class="grid-container" id="grid"></div>
        </div>

        <div id="tab-logs" class="tab-content">
            <table id="hTable">
                <thead><tr><th>Time</th><th>Location</th><th>Action</th><th>Item Name</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>

        <div id="tab-tools" class="tab-content">
            <button onclick="adminAction('EXCEL')" style="background:#27ae60; color:white; padding:15px; border:none; border-radius:5px; margin:10px; font-weight:bold">📊 EXPORT REPORT</button>
            <button onclick="adminAction('RESET')" style="background:#e74c3c; color:white; padding:15px; border:none; border-radius:5px; margin:10px; font-weight:bold">🗑️ CLEAR SSD</button>
        </div>

        <footer>
            <p>Access Point: <b style="color: #e94560;">bit.ly/asrs-cloud</b></p>
            <p>© 2026 HCMUTE Graduation Project - Student: Huy</p>
        </footer>
    </div>

    <script>
        const CFG = { url: 'wss://5031841c1f8d4218bafa640220641d55.s1.eu.hivemq.cloud:8884/mqtt', opt: { username: 'lhuy04', password: 'Hcmute2026', protocol: 'wss', port: 8884 } };
        let client, lastMsg = "", selectedSlot = null, currentData = {};

        function doLogin() {
            if(document.getElementById('user').value === "admin" && document.getElementById('pass').value === "hcmute2026") {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                initGrid(); connect();
            } else alert("Mật khẩu không đúng!");
        }

        function initGrid() {
            const g = document.getElementById('grid'); g.innerHTML = "";
            for(let i=1; i<=30; i++) {
                g.innerHTML += `<div class="slot" id="s-${i}" onclick="selectSlot(event, ${i})">
                    <b>Slot ${i}</b><br><span id="name-${i}" class="item-name">Available</span>
                </div>`;
            }
        }

        function selectSlot(event, id) {
            event.stopPropagation();
            document.querySelectorAll('.slot').forEach(s => s.classList.remove('selected'));
            document.getElementById(`s-${id}`).classList.add('selected');
            selectedSlot = id;
        }

        function deselectAll() {
            document.querySelectorAll('.slot').forEach(s => s.classList.remove('selected'));
            selectedSlot = null;
        }

        function connect() {
            client = mqtt.connect(CFG.url, CFG.opt);
            client.on('connect', () => {
                client.subscribe(['warehouse/status', 'warehouse/history', 'warehouse/history_init', 'warehouse/robot_state', 'warehouse/ack', 'warehouse/error']);
                client.publish('warehouse/command', JSON.stringify({action: "GET_STATUS"}));
                client.publish('warehouse/command', JSON.stringify({action: "GET_HISTORY"}));
            });
            client.on('message', (t, m) => {
                const s = m.toString();
                let d; try { d = JSON.parse(s); } catch(e) { d = s; }
                if(t === 'warehouse/status') { currentData = d; updateUI(d); }
                if(t === 'warehouse/robot_state') updateRobotState(d);
                if(t === 'warehouse/ack') Swal.fire('Thông báo', d, 'success');
                if(t === 'warehouse/error') Swal.fire('Lỗi', d, 'error');
                if(t === 'warehouse/history' && s !== lastMsg) { addRow(d); lastMsg = s; }
                if(t === 'warehouse/history_init') { document.querySelector("#hTable tbody").innerHTML = ""; d.forEach(l => addRow(l)); }
            });
        }

        function updateRobotState(state) {
            const el = document.getElementById('robot-status');
            el.style.display = 'block';
            if(state === "WAITING_CONVEYOR") el.innerText = "🤖 ROBOT: Đang đợi hàng đến...";
            else if(state === "WAITING_RFID") el.innerText = "🤖 ROBOT: Đang gán mã RFID ô hàng...";
            else { el.innerText = "🤖 ROBOT: Sẵn sàng"; setTimeout(() => el.style.display='none', 3000); }
        }

        // BẢNG NHẬP THÔNG TIN CHI TIẾT (ERP STYLE)
        async function openImportModal() {
            const { value: formValues } = await Swal.fire({
                title: '📦 KHAI BÁO HÀNG HÓA NHẬP KHO',
                html:
                    '<div style="text-align:left">' +
                    '<label class="swal-form-label">Tên món hàng:</label>' +
                    '<input id="swal-name" class="swal2-input swal-form-input" placeholder="Ví dụ: Chip xử lý...">' +
                    '<label class="swal-form-label">Loại danh mục:</label>' +
                    '<select id="swal-cat" class="swal2-input swal-form-input">' +
                        '<option value="Linh kiện">Linh kiện điện tử</option>' +
                        '<option value="Cơ khí">Phụ tùng cơ khí</option>' +
                        '<option value="Thực phẩm">Thực phẩm đóng gói</option>' +
                        '<option value="Khác">Hàng hóa khác</option>' +
                    '</select>' +
                    '<label class="swal-form-label">Nhà cung cấp:</label>' +
                    '<input id="swal-sup" class="swal2-input swal-form-input" placeholder="Tên công ty...">' +
                    '<label class="swal-form-label">Ghi chú bảo quản:</label>' +
                    '<input id="swal-note" class="swal2-input swal-form-input" placeholder="Yêu cầu đặc biệt...">' +
                    '</div>',
                focusConfirm: false,
                background: '#16213e', color: '#fff',
                showCancelButton: true,
                confirmButtonText: 'XÁC NHẬN NHẬP',
                preConfirm: () => {
                    const name = document.getElementById('swal-name').value;
                    if (!name) { Swal.showValidationMessage('Vui lòng nhập tên hàng!'); return false; }
                    return {
                        name: name,
                        category: document.getElementById('swal-cat').value,
                        supplier: document.getElementById('swal-sup').value,
                        note: document.getElementById('swal-note').value
                    }
                }
            });

            if (formValues) {
                // Gửi Metadata xuống Pi
                client.publish('warehouse/command', JSON.stringify({
                    action: "IMPORT", 
                    item_name: formValues.name,
                    item_details: formValues 
                }));
                Swal.fire('Đã nhận lệnh', 'Hệ thống đang tìm ô trống gần nhất...', 'info');
            }
        }

        // TRA CỨU THÔNG TIN CHI TIẾT
        function lookupItem() {
            if(!selectedSlot) return Swal.fire('Lưu ý', 'Vui lòng chọn 1 ô trên bản đồ!', 'warning');
            const item = currentData[`slot_${selectedSlot}`];
            if(!item || item.status !== "Occupied") return Swal.fire('Thông tin', 'Ô này đang trống.', 'info');

            const details = item.item_details || { category: "---", supplier: "---", note: "---" };

            Swal.fire({
                title: `CHI TIẾT Ô ${selectedSlot}`,
                html: `<div style="text-align:left; line-height:1.6">
                    <b style="color:#e94560">Sản phẩm:</b> ${item.item_name}<br>
                    <b style="color:#3498db">Danh mục:</b> ${details.category}<br>
                    <b style="color:#3498db">Nhà cung cấp:</b> ${details.supplier}<br>
                    <b style="color:#3498db">Ghi chú:</b> ${details.note}<br><hr>
                    <b>Mã RFID ô:</b> ${item.uid}<br>
                    <b>Thời gian nhập:</b> ${item.time || '---'}
                </div>`,
                icon: 'info',
                background: '#16213e', color: '#fff'
            });
        }

        function sendExport() {
            if(!selectedSlot) return Swal.fire('Lưu ý', 'Vui lòng chọn ô cần xuất hàng!', 'warning');
            client.publish('warehouse/command', JSON.stringify({action: "EXPORT", slot_id: selectedSlot}));
            deselectAll();
        }

        function updateUI(data) {
            for(let i=1; i<=30; i++) {
                const s = data[`slot_${i}`], div = document.getElementById(`s-${i}`), nameSpan = document.getElementById(`name-${i}`);
                if(s && s.status === "Occupied") { div.classList.add('occupied'); nameSpan.innerText = s.item_name; }
                else { div.classList.remove('occupied'); nameSpan.innerText = "Available"; }
            }
        }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function addRow(l) {
            const row = `<tr><td>${l.time}</td><td>Slot ${l.slot}</td><td><b>${l.act}</b></td><td>${l.item || '---'}</td></tr>`;
            document.querySelector("#hTable tbody").insertAdjacentHTML('afterbegin', row);
        }

        function adminAction(type) {
            if(prompt("Admin Password:") === "hcmute2026") {
                if(type === 'EXCEL') {
                    const wb = XLSX.utils.table_to_book(document.getElementById("hTable"));
                    XLSX.writeFile(wb, "Warehouse_Report.xlsx");
                } else client.publish('warehouse/command', JSON.stringify({action: "RESET_HISTORY"}));
            } else alert("Denied!");
        }
    </script>
</body>
</html>
